const STAFF_LIST = []; // TODO: スタッフを登録してください

// ===== 過去学習 詳細 =====
function TrainingDetail({inq, onDone}) {
  const [knCands, setKnCands]   = useState([]);
  const [knLoading, setKnLoading] = useState(true);
  const [pickedId, setPickedId] = useState(null);
  const [aiVerdict, setAiVerdict] = useState(null);
  const [correctAnswer, setCorrectAnswer] = useState('');
  const [autoCandAnswer, setAutoCandAnswer] = useState('');
  const [expandedCands, setExpandedCands] = useState({});
  const [editReason, setEditReason] = useState('');
  const [saving, setSaving]     = useState(false);
  const [done, setDone]         = useState(inq.status === 'replied');
  const [toast, setToast]       = useState(null);

  useEffect(() => {
    setKnLoading(true);
    searchKnowledge(inq).then(results => {
      setKnCands(results); setKnLoading(false);
      if (results.length > 0) {
        setPickedId(results[0].id);
        setAutoCandAnswer(results[0].answer);
      }
    });
  }, [inq.id]);

  const handleCorrect = (c) => { setPickedId(c.id); setAiVerdict('correct'); setAutoCandAnswer(c.answer); };
  const handleWrong   = (c) => { setPickedId(c.id); setAiVerdict('wrong');   setAutoCandAnswer(c.answer); setCorrectAnswer(''); };
  const scoreClass = s => s>=70?'score-hi':s>=40?'score-mid':'score-lo';

  const storeLabel = (s) => {
    if (s === 'takamatsu') return '🏯 高松';
    return s || '';
  };

  const handleComplete = async () => {
    setSaving(true);
    try {
      if (aiVerdict === 'wrong' && correctAnswer.trim()) {
        const pickedCand = knCands.find(c => c.id === pickedId);
        await sb.from('buddica_knowledge').insert({
          category: pickedCand?.category || inq.inquiry_type || 'その他',
          question:  inq.inquiry_content?.substring(0, 200) || '',
          answer:    correctAnswer.trim(),
          store:     inq.store || 'both',
          priority:  50,
          rule_basis:`過去学習: ${new Date().toLocaleDateString('ja-JP')} / ID:${inq.id}`,
        });
      }
      await sb.from('inquiries').update({
        status:        'replied',
        was_edited:    aiVerdict === 'correct' ? false : aiVerdict === 'wrong' ? true : null,
        correct_answer: aiVerdict === 'wrong' ? correctAnswer : null,
        edit_reason:   aiVerdict === 'wrong' ? (editReason || 'other') : null,
        intent_label:  knCands.find(c => c.id === pickedId)?.category || null,
        replied_at:    new Date().toISOString(),
      }).eq('id', inq.id);
      setDone(true);
      setToast(aiVerdict === 'wrong' && correctAnswer.trim() ? '🧠 ナレッジ登録 + 学習完了！' : '✅ 学習完了');
      onDone(inq.id);
    } catch(e) { alert('エラー: ' + e.message); }
    setSaving(false);
  };

  return (
    <>
      <div className="detail-inner">
        <div className="training-banner">
          📖 過去学習モード — 返信は不要。③正解を入力して「学習完了」を押すとナレッジに蓄積されます
        </div>

        <div className="sec">
          <div className="sec-title"><span className="sec-num" style={{background:'#6d28d9'}}>1</span> お問い合わせ内容</div>
          <div style={{fontSize:11,color:'#64748b',marginBottom:6}}>{new Date(inq.received_at).toLocaleString('ja-JP')} / {storeLabel(inq.store)} / {inq.email}</div>
          <div style={{background:'#f8fafc',borderRadius:8,padding:'12px 14px',fontSize:14,lineHeight:1.8,whiteSpace:'pre-wrap',color:'#1e293b',border:'1px solid #e2e8f0'}}>
            {inq.inquiry_content}
          </div>
        </div>

        <div className="sec" style={{borderColor:'#a5b4fc',background:'#eef2ff'}}>
          <div className="sec-title">
            <span className="sec-num" style={{background:knLoading?'#6d28d9':knCands.length>0?'#16a34a':'#94a3b8',transition:'background .5s'}}>2</span>
            <span>AI 回答候補</span>
            {!knLoading && knCands.length > 0 && <span style={{fontSize:11,fontWeight:400,color:'#15803d',textTransform:'none',letterSpacing:0}}>✅ {knCands.length}件ヒット</span>}
            {!knLoading && knCands.length === 0 && <span style={{fontSize:11,fontWeight:400,color:'#94a3b8',textTransform:'none',letterSpacing:0}}>該当なし</span>}
          </div>
          {knLoading ? (
            <div className="ai-scanning"><span className="spin">⟳</span><div className="ai-scanning-txt">検索中...</div></div>
          ) : knCands.length === 0 ? (
            <div className="no-cand">🤔 一致するルールが見つかりません<br/><span style={{fontSize:12}}>③に正解を入力してナレッジ登録してください</span></div>
          ) : (
            <div className="cand-list">
              {knCands.map(c => (
                <div key={c.id} className={`cand ${pickedId===c.id?'picked':''}`}>
                  <div className="cand-top">
                    <span className="cand-cat">{c.category}</span>
                    <span className={`cand-score ${scoreClass(c.score)}`}>関連度 {c.score}%</span>
                  </div>
                  <div className="cand-q">❓ {c.bestPattern}</div>
                  <div style={{marginBottom:8}}>
                    <div className="cand-prev" style={{whiteSpace:'pre-wrap',lineHeight:1.7,fontSize:13,color:'#374151'}}>
                      {expandedCands[c.id] ? c.answer : c.answer?.substring(0,80)+(c.answer?.length>80?'…':'')}
                    </div>
                    {c.answer?.length>80 && (
                      <button onClick={()=>setExpandedCands(p=>({...p,[c.id]:!p[c.id]}))}
                        style={{fontSize:11,color:'#3b82f6',background:'none',border:'none',cursor:'pointer',padding:'2px 0',fontWeight:600}}>
                        {expandedCands[c.id]?'▲ 閉じる':'▼ 全文を見る'}
                      </button>
                    )}
                  </div>
                  {!done && (
                    <div style={{display:'flex',gap:8}}>
                      <button onClick={()=>handleCorrect(c)} style={{flex:1,padding:'8px 0',borderRadius:8,border:'2px solid',
                        borderColor:pickedId===c.id&&aiVerdict==='correct'?'#16a34a':'#86efac',
                        background:pickedId===c.id&&aiVerdict==='correct'?'#16a34a':'#f0fdf4',
                        color:pickedId===c.id&&aiVerdict==='correct'?'white':'#16a34a',
                        cursor:'pointer',fontSize:13,fontWeight:700,minHeight:40}}>✅ 正しい</button>
                      <button onClick={()=>handleWrong(c)} style={{flex:1,padding:'8px 0',borderRadius:8,border:'2px solid',
                        borderColor:pickedId===c.id&&aiVerdict==='wrong'?'#dc2626':'#fca5a5',
                        background:pickedId===c.id&&aiVerdict==='wrong'?'#dc2626':'#fef2f2',
                        color:pickedId===c.id&&aiVerdict==='wrong'?'white':'#dc2626',
                        cursor:'pointer',fontSize:13,fontWeight:700,minHeight:40}}>❌ 違う</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>

        <div className={`sec ${aiVerdict==='wrong'?'sec-correct':''}`}>
          <div className="sec-title">
            <span className="sec-num" style={{background:'#f59e0b'}}>3</span>
            <span style={{color:'#92400e'}}>正解回答</span>
            {aiVerdict==='correct' && <span className="tbadge tbadge-ai">✅ AI正解</span>}
            {aiVerdict==='wrong'   && <span className="tbadge tbadge-edit">❌ スタッフ入力待ち</span>}
          </div>
          {done ? (
            <div style={{padding:'10px 14px',background:'#f0fdf4',border:'1px solid #86efac',borderRadius:8,fontSize:13,color:'#15803d',fontWeight:600}}>
              ✅ 学習完了済み
            </div>
          ) : (aiVerdict===null || aiVerdict==='correct') ? (
            <div style={{padding:'14px 16px',background:aiVerdict==='correct'?'#f0fdf4':'#f8fafc',
              border:`1.5px solid ${aiVerdict==='correct'?'#86efac':'#e2e8f0'}`,borderRadius:8,fontSize:13,
              color:aiVerdict==='correct'?'#15803d':'#94a3b8',fontWeight:aiVerdict==='correct'?600:400,lineHeight:1.7}}>
              {aiVerdict==='correct'
                ? '✅ AI正解と判定。そのまま「学習完了」を押してください。'
                : '② のAI候補を確認して ✅ 正しい または ❌ 違う を選んでください。'}
            </div>
          ) : (
            <div>
              <div style={{fontSize:12,color:'#92400e',marginBottom:8,fontWeight:600}}>
                ❌ AIが間違っていました。正しい回答を入力してください。
              </div>
              <textarea className="correct-ta" value={correctAnswer}
                onChange={e=>setCorrectAnswer(e.target.value)} rows={5} autoFocus
                placeholder="正しい回答本文を入力してください（挨拶・署名不要）"/>
              <div style={{marginTop:10,padding:'10px 14px',background:'#f8fafc',borderRadius:8,border:'1px solid #e2e8f0'}}>
                <div style={{fontSize:12,fontWeight:700,color:'#374151',marginBottom:6}}>なぜ違いましたか？</div>
                <div className="reason-sel">
                  {[{k:'wrong_info',l:'❌ 情報が間違い'},{k:'missing_info',l:'➕ 情報が不足'},
                    {k:'wrong_tone',l:'🎭 文体が不適切'},{k:'too_long',l:'✂️ 長すぎた'},
                    {k:'no_candidate',l:'🔍 候補がなかった'},{k:'other',l:'🔧 その他'}
                  ].map(r=>(
                    <button key={r.k} className={`reason-btn ${editReason===r.k?'on':''}`}
                      onClick={()=>setEditReason(r.k)}>{r.l}</button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>

        {!done && (
          <button className="training-done-btn" onClick={handleComplete} disabled={saving}>
            {saving ? '⟳ 保存中...' : aiVerdict==='wrong' && correctAnswer.trim()
              ? '🧠 ナレッジ登録して学習完了'
              : aiVerdict==='correct'
              ? '✅ AI正解として学習完了'
              : '⏭ スキップして次へ（判定なし）'}
          </button>
        )}
        {done && (
          <div style={{padding:'12px 16px',background:'#ede9fe',borderRadius:10,textAlign:'center',fontSize:14,fontWeight:700,color:'#6d28d9'}}>
            ✅ 学習完了済み
          </div>
        )}
      </div>
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </>
  );
}

// ===== 過去学習 ビュー =====
function TrainingView() {
  const isMobile = useIsMobile();
  const [items, setItems]       = useState([]);
  const [sel, setSel]           = useState(null);
  const [loading, setLoading]   = useState(true);
  const [filter, setFilter]     = useState('pending');
  const [mobilePane, setMobilePane] = useState('list');
  const [selected, setSelected] = useState(new Set());
  const [selectMode, setSelectMode] = useState(false);

  const storeLabel = (s) => {
    if (s === 'takamatsu') return '🏯 高松';
    return s || '';
  };

  const fetch_ = async () => {
    setLoading(true);
    const {data} = await sb.from('inquiries').select('*')
      .eq('source','training').order('received_at',{ascending:true});
    setItems(data||[]); setLoading(false);
  };
  useEffect(()=>{ fetch_(); },[]);

  const [search, setSearch] = useState('');

  const pending = items.filter(i => i.status !== 'replied');
  const done    = items.filter(i => i.status === 'replied');
  const baseList = filter === 'pending' ? pending : done;
  const shown = search
    ? baseList.filter(i => (i.name||'').includes(search) || (i.inquiry_content||'').includes(search) || (i.email||'').includes(search))
    : baseList;

  const handleDone = (id) => {
    setItems(prev => prev.map(i => i.id===id ? {...i, status:'replied'} : i));
    if (isMobile) setMobilePane('list');
  };

  const toggleSelect = (id) => {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };

  const toggleSelectAll = (e) => {
    e.stopPropagation();
    if (selected.size === shown.length && shown.length > 0) {
      setSelected(new Set());
    } else {
      setSelected(new Set(shown.map(i => i.id)));
    }
  };

  const handleBulkDelete = async (e) => {
    e.stopPropagation();
    if (selected.size === 0) return;
    if (!confirm(`選択した ${selected.size} 件を削除しますか？`)) return;
    const ids = [...selected];
    await sb.from('inquiries').delete().in('id', ids);
    setItems(prev => prev.filter(i => !ids.includes(i.id)));
    if (ids.includes(sel?.id)) setSel(null);
    setSelected(new Set());
    setSelectMode(false);
  };

  const selectItem = (item) => {
    if (selectMode) return;
    setSel(item);
    if (isMobile) setMobilePane('detail');
  };

  const listPanel = (
    <div className="list-panel">
      <div style={{padding:'12px 16px',borderBottom:'1px solid #e2e8f0',background:'white',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
          <div style={{fontSize:15,fontWeight:800,color:'#6d28d9'}}>📖 過去学習</div>
          <button onClick={()=>{ setSelectMode(v=>!v); setSelected(new Set()); }}
            style={{fontSize:12,fontWeight:700,padding:'4px 10px',borderRadius:6,border:'1px solid',cursor:'pointer',
              borderColor:selectMode?'#ef4444':'#6d28d9',
              background:selectMode?'#fef2f2':'#ede9fe',
              color:selectMode?'#ef4444':'#6d28d9'}}>
            {selectMode ? '✕ キャンセル' : '☑ 選択'}
          </button>
        </div>

        {selectMode && (
          <div style={{display:'flex',gap:6,marginBottom:8,padding:'8px 10px',background:'#fef2f2',borderRadius:8,alignItems:'center'}}>
            <button onClick={toggleSelectAll}
              style={{fontSize:12,fontWeight:700,padding:'4px 10px',borderRadius:6,border:'1px solid #fca5a5',
                background:'white',color:'#ef4444',cursor:'pointer',whiteSpace:'nowrap'}}>
              {selected.size === shown.length && shown.length > 0 ? '✕ 全解除' : '✓ 全選択'}
            </button>
            <span style={{fontSize:12,color:'#ef4444',fontWeight:600}}>{selected.size}件選択中</span>
            <button onClick={handleBulkDelete} disabled={selected.size===0}
              style={{marginLeft:'auto',fontSize:12,fontWeight:800,padding:'6px 14px',borderRadius:6,border:'none',
                background:selected.size>0?'#ef4444':'#fca5a5',color:'white',
                cursor:selected.size>0?'pointer':'not-allowed',whiteSpace:'nowrap'}}>
              🗑 {selected.size}件削除
            </button>
          </div>
        )}

        <div style={{display:'flex',gap:6,marginBottom:8}}>
          <button onClick={()=>setFilter('pending')}
            style={{flex:1,padding:'6px 0',border:'1px solid',borderRadius:6,cursor:'pointer',fontWeight:700,fontSize:12,
              borderColor:filter==='pending'?'#6d28d9':'#e2e8f0',
              background:filter==='pending'?'#6d28d9':'white',
              color:filter==='pending'?'white':'#64748b'}}>
            未学習 {pending.length}件
          </button>
          <button onClick={()=>setFilter('done')}
            style={{flex:1,padding:'6px 0',border:'1px solid',borderRadius:6,cursor:'pointer',fontWeight:700,fontSize:12,
              borderColor:filter==='done'?'#16a34a':'#e2e8f0',
              background:filter==='done'?'#16a34a':'white',
              color:filter==='done'?'white':'#64748b'}}>
            完了 {done.length}件
          </button>
        </div>

        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="🔍 名前・内容で検索..."
          style={{width:'100%',padding:'6px 10px',border:'1px solid #e2e8f0',borderRadius:6,fontSize:12,outline:'none'}}/>
      </div>

      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        {loading ? (
          <div style={{padding:40,textAlign:'center',color:'#94a3b8'}}>読み込み中...</div>
        ) : shown.length === 0 ? (
          <div style={{padding:40,textAlign:'center',color:'#94a3b8',fontSize:14}}>
            {filter==='pending' ? '🎉 未学習メールはありません' : '該当データがありません'}
          </div>
        ) : shown.map(inq => {
          const isChecked = selected.has(inq.id);
          return (
            <div key={inq.id}
              onClick={() => selectMode ? toggleSelect(inq.id) : selectItem(inq)}
              style={{padding:'12px 16px',borderBottom:'1px solid #f1f5f9',cursor:'pointer',
                display:'flex',alignItems:'flex-start',gap:10,userSelect:'none',
                background: isChecked ? '#fef2f2' : sel?.id===inq.id ? '#ede9fe' : 'white',
                borderLeft: isChecked ? '3px solid #ef4444' : sel?.id===inq.id ? '3px solid #6d28d9' : '3px solid transparent'}}>

              {selectMode && (
                <div style={{width:20,height:20,borderRadius:4,flexShrink:0,marginTop:2,
                  border:`2px solid ${isChecked?'#ef4444':'#cbd5e1'}`,
                  background:isChecked?'#ef4444':'white',
                  display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
                  {isChecked && <span style={{color:'white',fontSize:12,fontWeight:900,lineHeight:1}}>✓</span>}
                </div>
              )}

              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{fontSize:13,fontWeight:700,color:'#1e293b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {inq.name||'お客様'}
                  </span>
                  <span style={{fontSize:11,color:'#94a3b8',flexShrink:0,marginLeft:6}}>
                    {new Date(inq.received_at).toLocaleDateString('ja-JP')}
                  </span>
                </div>
                <div style={{fontSize:12,color:'#64748b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {inq.inquiry_content?.substring(0,60)}
                </div>
                <div style={{marginTop:4,display:'flex',gap:4}}>
                  <span style={{fontSize:10,background:'#ede9fe',color:'#6d28d9',padding:'1px 6px',borderRadius:4,fontWeight:600}}>
                    {storeLabel(inq.store)}
                  </span>
                  {inq.status==='replied' &&
                    <span style={{fontSize:10,background:'#dcfce7',color:'#15803d',padding:'1px 6px',borderRadius:4,fontWeight:600}}>✅ 完了</span>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

  if (isMobile) {
    return (
      <div style={{height:'100%',overflow:'hidden'}}>
        {mobilePane==='list' ? listPanel : sel && (
          <div style={{height:'100%',overflow:'auto'}}>
            <div className="back-bar">
              <button className="back-btn" onClick={()=>setMobilePane('list')}>← 一覧に戻る</button>
            </div>
            <TrainingDetail inq={sel} onDone={handleDone}/>
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="inbox-layout">
      {listPanel}
      <div className="detail-panel">
        {sel ? <TrainingDetail inq={sel} onDone={handleDone}/> : (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',color:'#94a3b8',gap:12}}>
            <div style={{fontSize:48}}>📖</div>
            <div style={{fontSize:15,fontWeight:700}}>過去のメールを選んで学習開始</div>
            <div style={{fontSize:13}}>未学習 {pending.length}件 / 完了 {done.length}件</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ===== APP =====
function App() {
  const [tab, setTab]       = useState('inbox');
  const [newCnt, setNewCnt] = useState(0);
  const [staff, setStaff]   = useState(() => localStorage.getItem('buddica_staff') || '');

  useEffect(()=>{
    const poll=async()=>{const{count}=await sb.from('inquiries').select('*',{count:'exact',head:true}).eq('status','new').eq('source','manual');setNewCnt(count||0);};
    poll();const t=setInterval(poll,30000);return()=>clearInterval(t);
  },[]);

  const handleStaffChange = (e) => {
    const v = e.target.value;
    setStaff(v);
    localStorage.setItem('buddica_staff', v);
  };

  // スタッフ未選択 or スタッフリスト空の場合
  if (!staff && STAFF_LIST.length > 0) {
    return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',background:'#f0f2f5',gap:20}}>
        <div style={{fontSize:28,fontWeight:900,color:'#0f172a',letterSpacing:2}}>BUDDICA</div>
        <div style={{fontSize:15,color:'#64748b'}}>お問い合わせ管理システム</div>
        <div style={{background:'white',borderRadius:16,padding:32,width:300,boxShadow:'0 4px 24px rgba(0,0,0,.1)'}}>
          <div style={{fontSize:14,fontWeight:700,color:'#374151',marginBottom:16}}>スタッフを選択してください</div>
          {STAFF_LIST.map(s => (
            <button key={s} onClick={()=>{setStaff(s);localStorage.setItem('buddica_staff',s);}}
              style={{display:'block',width:'100%',padding:'12px 16px',margin:'6px 0',background:'#f8fafc',
                border:'2px solid #e2e8f0',borderRadius:10,cursor:'pointer',fontSize:15,fontWeight:700,
                color:'#374151',textAlign:'left',transition:'all .15s'}}
              onMouseOver={e=>e.target.style.borderColor='#3b82f6'}
              onMouseOut={e=>e.target.style.borderColor='#e2e8f0'}>
              👤 {s}
            </button>
          ))}
        </div>
      </div>
    );
  }

  // STAFF_LIST が空の場合はログインなしで直接アクセス
  const effectiveStaff = staff || 'admin';

  return (
    <div className="page-root">
      <div className="hd">
        <span className="hd-logo">BUDDICA</span>
        <span className="hd-title" style={{display:'none'}}>お問い合わせ管理</span>
        <div className="hd-tabs">
          <button className={`tab-btn ${tab==='inbox'?'on':''}`} onClick={()=>setTab('inbox')}>
            📬 受信 {newCnt>0&&<span className="badge-new">{newCnt}</span>}
          </button>
          <button className={`tab-btn ${tab==='training'?'on':''}`} onClick={()=>setTab('training')}>📖 過去学習</button>
          <button className={`tab-btn ${tab==='learning'?'on':''}`} onClick={()=>setTab('learning')}>📚 学習</button>
          <button className={`tab-btn ${tab==='knowledge'?'on':''}`} onClick={()=>setTab('knowledge')}>🧠 知識</button>
          <button className={`tab-btn ${tab==='tmpls'?'on':''}`} onClick={()=>setTab('tmpls')}>📋 テンプレ</button>
        </div>
        {STAFF_LIST.length > 0 && (
          <div className="staff-sel">
            <span className="staff-badge">👤</span>
            <select value={staff} onChange={handleStaffChange}>
              {STAFF_LIST.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        )}
      </div>

      {tab==='inbox'    && <InboxView staff={effectiveStaff}/>}
      {tab==='training' && <TrainingView/>}
      {tab==='learning' && <div className="wrap" style={{display:'block',overflow:'auto'}}><LearningView/></div>}
      {tab==='knowledge'&& <div className="wrap" style={{display:'block',overflow:'auto'}}><KnowledgeView/></div>}
      {tab==='tmpls'    && <div className="wrap" style={{display:'block',overflow:'auto'}}><TemplatesView/></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
