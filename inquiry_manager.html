// ===== INQUIRY DETAIL =====
function InquiryDetail({inq, onReplyOk, onRefresh, onBack, isMobile, staff}) {
  const [knCands, setKnCands]           = useState([]);
  const [knLoading, setKnLoading]       = useState(true);
  const [pickedId, setPickedId]         = useState(null);
  const [aiVerdict, setAiVerdict]       = useState(null);
  const [correctAnswer, setCorrectAnswer] = useState('');
  const [autoCandAnswer, setAutoCandAnswer] = useState('');
  const [expandedCands, setExpandedCands] = useState({});
  const [showDiff, setShowDiff]         = useState(false);
  const [editReason, setEditReason]     = useState('');
  const [replyTxt, setReplyTxt]         = useState('');
  const [replyManual, setReplyManual]   = useState(false);
  const [sending, setSending]           = useState(false);
  const [msgState, setMsgState]         = useState(null);
  const [progStatus, setProgStatus]     = useState(inq.status || 'new');
  const [assignedTo, setAssignedTo]     = useState(inq.assigned_to || null);
  const [lockedBy, setLockedBy]         = useState(null);
  const [showRegister, setShowRegister] = useState(false);
  const [toast, setToast]               = useState(null);
  const autoDraftRef = useRef('');
  const LOCK_TIMEOUT = 30 * 60 * 1000;

  const changeStatus = async (newStatus) => {
    await sb.from('inquiries').update({status: newStatus}).eq('id', inq.id);
    setProgStatus(newStatus);

    const assigneeUpdates = {};
    if (newStatus === 'new') {
      assigneeUpdates.assigned_to = null;
      assigneeUpdates.locked_at = null;
      setAssignedTo(null); setLockedBy(null);
    } else if (newStatus === 'in_progress' && staff) {
      assigneeUpdates.assigned_to = staff;
      assigneeUpdates.locked_at = new Date().toISOString();
      setAssignedTo(staff);
    } else if (newStatus === 'pending') {
      assigneeUpdates.locked_at = null;
      if (!assignedTo && staff) { assigneeUpdates.assigned_to = staff; setAssignedTo(staff); }
    }
    if (Object.keys(assigneeUpdates).length > 0) {
      sb.from('inquiries').update(assigneeUpdates).eq('id', inq.id).then(({error}) => {
        if (error) console.warn('[assigned_to update skipped]');
      });
    }
    onRefresh();
  };

  const acquireLock = async () => {
    if (inq.status === 'replied') return;
    try {
      const {data} = await sb.from('inquiries').select('assigned_to,locked_at,status').eq('id',inq.id).single();
      if (!data) return;
      if (data.assigned_to && data.assigned_to !== staff && data.locked_at) {
        const elapsed = Date.now() - new Date(data.locked_at).getTime();
        if (elapsed < LOCK_TIMEOUT) { setLockedBy(data.assigned_to); return; }
      }
      if (!data.status || data.status === 'new') {
        await sb.from('inquiries').update({status:'in_progress'}).eq('id',inq.id);
        setProgStatus('in_progress'); onRefresh();
        sb.from('inquiries').update({assigned_to:staff, locked_at:new Date().toISOString()}).eq('id',inq.id)
          .then(({error})=>{ if(!error) setAssignedTo(staff); });
      } else if (data.assigned_to !== staff && !data.assigned_to) {
        sb.from('inquiries').update({assigned_to:staff, locked_at:new Date().toISOString()}).eq('id',inq.id)
          .then(({error})=>{ if(!error) setAssignedTo(staff); });
      }
    } catch(e) { /* ignore */ }
  };

  const releaseLock = async () => {
    if (!staff) return;
    try {
      await sb.from('inquiries').update({locked_at: null}).eq('id', inq.id);
    } catch(e) { /* ignore */ }
  };

  useEffect(() => {
    if (staff) acquireLock();
    return () => { releaseLock(); };
  }, [inq.id]);

  useEffect(() => {
    if (!staff || progStatus === 'replied') return;
    const timer = setInterval(async () => {
      const {data} = await sb.from('inquiries').select('assigned_to').eq('id',inq.id).single();
      if (data?.assigned_to === staff) {
        await sb.from('inquiries').update({locked_at: new Date().toISOString()}).eq('id', inq.id);
      }
    }, 10 * 60 * 1000);
    return () => clearInterval(timer);
  }, [inq.id, staff, progStatus]);

  useEffect(() => {
    setKnLoading(true); setKnCands([]); setPickedId(null);
    setAiVerdict(null); setCorrectAnswer(''); setAutoCandAnswer('');
    setShowDiff(false); setEditReason('');
    setReplyTxt(''); setReplyManual(false);
    setMsgState(null); setProgStatus(inq.status || 'new');
    setAssignedTo(inq.assigned_to || null); setLockedBy(null);

    if (inq.reply_content) {
      setReplyTxt(inq.reply_content);
      if (inq.correct_answer) setCorrectAnswer(inq.correct_answer);
      if (inq.was_edited === false) setAiVerdict('correct');
      if (inq.was_edited === true)  setAiVerdict('wrong');
      if (inq.auto_draft) {
        const m = inq.auto_draft.match(/BUDDICA 高松店でございます。\n\n([\s\S]+?)\n\nご不明な点/);
        setAutoCandAnswer(m ? m[1] : '');
      }
    }

    searchKnowledge(inq).then(results => {
      setKnCands(results); setKnLoading(false);
      if (!inq.reply_content && results.length > 0) {
        setPickedId(results[0].id);
        setAutoCandAnswer(results[0].answer);
        const draft = buildReply(inq, results[0].answer);
        autoDraftRef.current = draft;
        if (!inq.auto_draft) sb.from('inquiries').update({auto_draft:draft}).eq('id',inq.id).then(()=>{});
      }
    });
  }, [inq.id]);

  const handleCorrect = (cand) => {
    setPickedId(cand.id);
    setAiVerdict('correct');
    setCorrectAnswer('');
    const draft = buildReply(inq, cand.answer);
    setReplyTxt(draft);
    autoDraftRef.current = draft;
    setAutoCandAnswer(cand.answer);
    setReplyManual(false);
  };

  const handleWrong = (cand) => {
    setPickedId(cand.id);
    setAiVerdict('wrong');
    setCorrectAnswer('');
    setAutoCandAnswer(cand.answer);
    setReplyTxt(buildReply(inq, ''));
    autoDraftRef.current = buildReply(inq, cand.answer);
  };

  const handleCorrectChange = val => {
    setCorrectAnswer(val);
    setReplyManual(false);
    setReplyTxt(buildReply(inq, val));
  };

  const pickCand = c => { setPickedId(c.id); };

  const markProgress = () => changeStatus('in_progress');

  const handleSend = async () => {
    if (!replyTxt.trim() || replyTxt === buildReply(inq,'')) {
      alert('返信内容を入力してください'); return;
    }
    if (!inq.email) { alert('送信先メールアドレスがありません'); return; }
    if (GAS_URL==='YOUR_GAS_WEBAPP_URL_HERE') alert('GAS_URLが未設定です。\nSupabaseへの保存のみ行います。');
    setSending(true); setMsgState(null);

    const wasEdited = aiVerdict === 'wrong' ? true : aiVerdict === 'correct' ? false : null;
    const matchScore = aiVerdict === 'correct' ? 100 : (() => {
      if (!autoDraftRef.current || !replyTxt) return 0;
      const a=autoDraftRef.current, r=replyTxt;
      let common=0; const sh=a.length<r.length?a:r, lo=a.length>=r.length?a:r;
      for(let i=0;i<sh.length;i++){if(sh[i]===lo[i])common++;}
      return Math.round((common/Math.max(a.length,r.length))*100);
    })();

    try {
      if (GAS_URL!=='YOUR_GAS_WEBAPP_URL_HERE') {
        await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({action:'send_reply',to:inq.email,subject:'Re: お問い合わせについて【BUDDICA】',body:replyTxt,inquiry_id:inq.id})});
      }
      await sb.from('inquiries').update({
        status:'replied', reply_content:replyTxt,
        correct_answer: aiVerdict==='wrong' ? correctAnswer : null,
        replied_at:new Date().toISOString(), auto_draft:autoDraftRef.current,
        was_edited:wasEdited, match_score:matchScore,
        intent_label:knCands.find(c=>c.id===pickedId)?.category||null,
        edit_reason: aiVerdict==='wrong' ? (editReason||'other') : null,
      }).eq('id',inq.id);
      if (staff || assignedTo) {
        sb.from('inquiries').update({assigned_to: staff||assignedTo, locked_at:null}).eq('id',inq.id).then(()=>{},()=>{});
      }

      let autoRegistered = false;
      if (aiVerdict==='wrong' && correctAnswer.trim()) {
        const pickedCand = knCands.find(c=>c.id===pickedId);
        const category = pickedCand?.category || inq.inquiry_type || 'その他';
        await sb.from('buddica_knowledge').insert({
          category,
          question: inq.inquiry_content?.substring(0,200) || '',
          answer: correctAnswer.trim(),
          store: inq.store || 'both',
          priority: 50,
          rule_basis: `自動登録: ${new Date().toLocaleDateString('ja-JP')} / 問合ID:${inq.id}`
        });
        autoRegistered = true;
      }

      setProgStatus('replied');
      const verdictTxt = aiVerdict==='correct'?'✅ AI正解':'✏️ スタッフ修正';
      const regTxt = autoRegistered ? ' + 🧠 ナレッジ自動登録' : '';
      setMsgState({type:'ok',txt:`✅ 送信しました（${verdictTxt} / 一致率${matchScore}%${regTxt}）`});
      onReplyOk(inq.id, replyTxt);
    } catch(e) { setMsgState({type:'err',txt:`❌ エラー: ${e.message}`}); }
    setSending(false);
  };

  const sl = stCfg(progStatus);
  const scoreClass = s => s>=70?'score-hi':s>=40?'score-mid':'score-lo';
  const isReplied = progStatus==='replied';
  const canRegister = aiVerdict==='wrong' && correctAnswer.trim() && !isReplied;

  const storeLabel = (s) => {
    if (s === 'takamatsu') return '🏯 高松';
    return s || '';
  };

  return (
    <>
      {isMobile && onBack && (
        <div className="back-bar">
          <button className="back-btn" onClick={onBack}>
            ← 一覧に戻る
          </button>
        </div>
      )}
      <div className="detail-inner">

        {lockedBy && lockedBy !== staff && (
          <div className="lock-banner">
            🔒 <strong>{lockedBy}</strong> が現在対応中です。編集は{lockedBy}が完了後に行ってください。
          </div>
        )}

        <div className="sec">
          <div className="dh">
            <div style={{flex:1,minWidth:0}}>
              <div className="dh-name">{inq.name} 様</div>
              <div className="dh-meta">
                <span className="meta">📧 <strong>{inq.email||'未入力'}</strong></span>
                <span className="meta">📞 <strong>{inq.phone||'未入力'}</strong></span>
                <span className="meta">🕐 <strong>{fmtFull(inq.received_at)}</strong></span>
              </div>
            </div>
            <div style={{display:'flex',gap:6,alignItems:'flex-start',flexShrink:0}}>
              <span className={`st ${sl.c}`} style={{fontSize:13}}>{sl.icon} {sl.t}</span>
              {inq.store && <span className="st st-store">{storeLabel(inq.store)}</span>}
              {inq.source==='demo' && <span style={{fontSize:11,background:'#fef9c3',color:'#854d0e',padding:'2px 8px',borderRadius:4,fontWeight:700}}>DEMO</span>}
            </div>
          </div>

          {!isReplied && (
            <div className="status-bar">
              <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                <span className="status-bar-label">担当:</span>
                <select
                  value={assignedTo || ''}
                  onChange={async e => {
                    const v = e.target.value || null;
                    setAssignedTo(v);
                    await sb.from('inquiries').update({assigned_to: v}).eq('id', inq.id);
                    onRefresh();
                  }}
                  style={{padding:'4px 8px',border:'1.5px solid #bfdbfe',borderRadius:8,fontSize:13,
                    fontWeight:700,color:'#1e40af',background:'#eff6ff',cursor:'pointer',outline:'none',
                    minWidth:90}}>
                  <option value=''>未割当</option>
                  {STAFF_LIST.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>

              <div style={{display:'flex',gap:6,flexWrap:'wrap',marginLeft:'auto'}}>
                <button
                  className={`status-btn status-btn-new ${progStatus==='new'?'on':''}`}
                  onClick={()=>changeStatus('new')}
                  disabled={progStatus==='new'}>
                  🔴 未対応
                </button>
                <button
                  className={`status-btn status-btn-prog ${progStatus==='in_progress'?'on':''}`}
                  onClick={()=>changeStatus('in_progress')}
                  disabled={progStatus==='in_progress'}>
                  🟡 対応中
                </button>
                <button
                  className={`status-btn status-btn-pending ${progStatus==='pending'?'on':''}`}
                  onClick={()=>changeStatus('pending')}
                  disabled={progStatus==='pending'}>
                  ⏸ 保留中
                </button>
                <button
                  className={`status-btn status-btn-done ${progStatus==='replied'?'on':''}`}
                  onClick={()=>changeStatus('replied')}
                  disabled={progStatus==='replied'}>
                  ✅ 完了
                </button>
              </div>
            </div>
          )}
          {isReplied && (
            <div className="status-bar" style={{marginTop:8}}>
              <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                <span className="status-bar-label">担当:</span>
                <select
                  value={assignedTo || ''}
                  onChange={async e => {
                    const v = e.target.value || null;
                    setAssignedTo(v);
                    await sb.from('inquiries').update({assigned_to: v}).eq('id', inq.id);
                    onRefresh();
                  }}
                  style={{padding:'3px 8px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:12,
                    fontWeight:700,color:'#64748b',background:'#f8fafc',cursor:'pointer',outline:'none'}}>
                  <option value=''>未割当</option>
                  {STAFF_LIST.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
                {inq.replied_at && <span style={{fontSize:11,color:'#94a3b8'}}>返信: {fmtFull(inq.replied_at)}</span>}
              </div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',marginLeft:'auto'}}>
                <button className="status-btn status-btn-new" onClick={()=>changeStatus('new')}>🔴 未対応に戻す</button>
                <button className="status-btn status-btn-prog" onClick={()=>changeStatus('in_progress')}>🟡 対応中に戻す</button>
                <button className="status-btn status-btn-pending" onClick={()=>changeStatus('pending')}>⏸ 保留中に戻す</button>
              </div>
            </div>
          )}
        </div>

        {/* ① 問い合わせ内容 */}
        <div className="sec">
          <div className="sec-title"><span className="sec-num">1</span> お問い合わせ内容
            <span style={{fontSize:11,fontWeight:400,color:'#94a3b8',textTransform:'none',letterSpacing:0}}>{inq.inquiry_type}</span>
          </div>
          <div className="content-box">{inq.inquiry_content}</div>
        </div>

        {/* ② 回答候補 */}
        <div className="sec" style={{borderColor: knLoading ? '#93c5fd' : knCands.length > 0 ? '#86efac' : '#e2e8f0', transition:'border-color .5s'}}>
          <div className="sec-title">
            <span className="sec-num" style={{background: knLoading ? '#3b82f6' : knCands.length > 0 ? '#16a34a' : '#94a3b8', transition:'background .5s'}}>2</span>
            <span>AI 回答候補</span>
            {knLoading && <span style={{fontSize:11,fontWeight:400,color:'#3b82f6',textTransform:'none',letterSpacing:0}}>🔍 知識ベースを検索中...</span>}
            {!knLoading && knCands.length > 0 && <span style={{fontSize:11,fontWeight:400,color:'#15803d',textTransform:'none',letterSpacing:0}}>✅ {knCands.length}件ヒット — 選択して③に反映</span>}
            {!knLoading && knCands.length === 0 && <span style={{fontSize:11,fontWeight:400,color:'#94a3b8',textTransform:'none',letterSpacing:0}}>該当なし</span>}
          </div>
          {knLoading ? (
            <div className="ai-scanning">
              <span className="spin" style={{fontSize:18}}>🔍</span>
              <div>
                <div className="ai-scanning-txt">AIがルールを検索中です...</div>
                <div style={{fontSize:11,color:'#64748b',marginTop:2}}>知識ベース x 問い合わせ内容 を照合しています</div>
              </div>
            </div>
          ) : knCands.length===0 ? (
            <div className="no-cand">
              <div style={{fontSize:24,marginBottom:6}}>🤔</div>
              <strong>一致するルールが見つかりません</strong><br/>
              <span style={{fontSize:12}}>③ 欄に正解を直接入力 → 「ナレッジ登録」で次回から候補に出ます</span>
            </div>
          ) : (
            <>
              {!isReplied && aiVerdict===null && (
                <div style={{padding:'10px 12px',background:'#f0f9ff',border:'1px solid #bae6fd',borderRadius:8,fontSize:12,color:'#0369a1',marginBottom:10}}>
                  💡 AI候補を確認して <strong>✅ 正しい</strong> または <strong>❌ 違う</strong> を選んでください
                </div>
              )}
              {!isReplied && aiVerdict==='correct' && (
                <div className="ai-done-bar" style={{background:'#f0fdf4',border:'1px solid #86efac',color:'#15803d'}}>
                  ✅ AI正解と判定しました — ④の返信内容を確認して送信できます
                </div>
              )}
              {!isReplied && aiVerdict==='wrong' && (
                <div className="ai-done-bar" style={{background:'#fef2f2',border:'1px solid #fca5a5',color:'#b91c1c'}}>
                  ❌ AI間違いと判定しました — ③ に正解を入力してください
                </div>
              )}
              <div className="cand-list">
                {knCands.map(c => (
                  <div key={c.id} className={`cand ${pickedId===c.id?'picked':''}`}>
                    <div className="cand-top" onClick={()=>pickCand(c)} style={{cursor:'pointer'}}>
                      <span className="cand-cat">{pickedId===c.id?'✓ ':''}{c.category}</span>
                      <span className={`cand-score ${scoreClass(c.score)}`}>関連度 {c.score}%</span>
                    </div>
                    <div className="cand-q" onClick={()=>pickCand(c)} style={{cursor:'pointer'}}>❓ {c.bestPattern}</div>
                    <div style={{marginBottom:8}}>
                      <div className="cand-prev" style={{whiteSpace:'pre-wrap',lineHeight:1.7,fontSize:13,color:'#374151'}}>
                        {expandedCands[c.id]
                          ? c.answer
                          : c.answer?.substring(0,80)+(c.answer?.length>80?'…':'')}
                      </div>
                      {c.answer?.length>80 && (
                        <button onClick={()=>setExpandedCands(p=>({...p,[c.id]:!p[c.id]}))}
                          style={{fontSize:11,color:'#3b82f6',background:'none',border:'none',cursor:'pointer',padding:'2px 0',fontWeight:600}}>
                          {expandedCands[c.id]?'▲ 閉じる':'▼ 全文を見る'}
                        </button>
                      )}
                    </div>
                    {!isReplied && (
                      <div style={{display:'flex',gap:8,marginTop:4}}>
                        <button
                          onClick={()=>handleCorrect(c)}
                          style={{flex:1,padding:'8px 0',borderRadius:8,border:'2px solid',
                            borderColor: pickedId===c.id&&aiVerdict==='correct'?'#16a34a':'#86efac',
                            background: pickedId===c.id&&aiVerdict==='correct'?'#16a34a':'#f0fdf4',
                            color: pickedId===c.id&&aiVerdict==='correct'?'white':'#16a34a',
                            cursor:'pointer',fontSize:13,fontWeight:700,minHeight:40,transition:'all .15s'}}>
                          ✅ 正しい
                        </button>
                        <button
                          onClick={()=>handleWrong(c)}
                          style={{flex:1,padding:'8px 0',borderRadius:8,border:'2px solid',
                            borderColor: pickedId===c.id&&aiVerdict==='wrong'?'#dc2626':'#fca5a5',
                            background: pickedId===c.id&&aiVerdict==='wrong'?'#dc2626':'#fef2f2',
                            color: pickedId===c.id&&aiVerdict==='wrong'?'white':'#dc2626',
                            cursor:'pointer',fontSize:13,fontWeight:700,minHeight:40,transition:'all .15s'}}>
                          ❌ 違う
                        </button>
                      </div>
                    )}
                    {isReplied && pickedId===c.id && (
                      <div style={{marginTop:4,fontSize:12,fontWeight:700,color:inq.was_edited===false?'#16a34a':'#d97706'}}>
                        {inq.was_edited===false?'✅ AI正解と記録済み':'✏️ スタッフ修正済み'}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </>
          )}
        </div>

        {/* ③ 正解回答 */}
        {(() => {
          if (isReplied) {
            return (
              <div className="sec">
                <div className="sec-title">
                  <span className="sec-num" style={{background:'#f59e0b'}}>3</span>
                  <span style={{color:'#92400e'}}>正解回答</span>
                  {inq.was_edited===false && <span className="tbadge tbadge-ai">🤖 AI正解（編集なし）</span>}
                  {inq.was_edited===true  && <span className="tbadge tbadge-edit">✏️ スタッフ修正済み</span>}
                </div>
                {inq.was_edited===false && (
                  <div style={{padding:'10px 14px',background:'#f0fdf4',border:'1px solid #86efac',borderRadius:8,fontSize:13,color:'#15803d',fontWeight:600}}>
                    ✅ AI候補が正しいと判定されました。スタッフ入力なしで学習記録されます。
                  </div>
                )}
                {inq.was_edited===true && inq.correct_answer && (
                  <div>
                    <div style={{fontSize:12,color:'#92400e',marginBottom:6,fontWeight:600}}>スタッフが入力した正解：</div>
                    <div style={{padding:'10px 14px',background:'#fffbeb',border:'1.5px solid #f59e0b',borderRadius:8,fontSize:14,lineHeight:1.8,whiteSpace:'pre-wrap',color:'#374151'}}>
                      {inq.correct_answer}
                    </div>
                    {inq.edit_reason && (
                      <div style={{marginTop:6,fontSize:12,color:'#8b5cf6',fontWeight:600}}>
                        修正理由: {[{k:'wrong_info',l:'情報が間違い'},{k:'missing_info',l:'情報が不足'},{k:'wrong_tone',l:'文体・トーンが不適切'},{k:'too_long',l:'長すぎた'},{k:'no_candidate',l:'候補がなかった'},{k:'other',l:'その他'}].find(r=>r.k===inq.edit_reason)?.l||inq.edit_reason}
                      </div>
                    )}
                  </div>
                )}
                {inq.was_edited===null && (
                  <div style={{padding:'10px 14px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:8,fontSize:13,color:'#64748b'}}>
                    — 判定なし（送信済み）
                  </div>
                )}
              </div>
            );
          }

          return (
            <div className={`sec ${aiVerdict==='wrong'?'sec-correct':''}`}>
              <div className="sec-title">
                <span className="sec-num" style={{background:'#f59e0b'}}>3</span>
                <span style={{color:'#92400e'}}>正解回答</span>
                {aiVerdict==='correct' && <span className="tbadge tbadge-ai">✅ AI正解</span>}
                {aiVerdict==='wrong'   && <span className="tbadge tbadge-edit">❌ スタッフ入力待ち</span>}
              </div>

              {(aiVerdict===null || aiVerdict==='correct') && (
                <div style={{
                  padding:'14px 16px',
                  background: aiVerdict==='correct'?'#f0fdf4':'#f8fafc',
                  border: `1.5px solid ${aiVerdict==='correct'?'#86efac':'#e2e8f0'}`,
                  borderRadius:8, fontSize:13,
                  color: aiVerdict==='correct'?'#15803d':'#94a3b8',
                  fontWeight: aiVerdict==='correct'?600:400,
                  lineHeight:1.7
                }}>
                  {aiVerdict==='correct'
                    ? '✅ AI候補が正しいと判定されました。③の入力は不要です。このまま④の返信を送信してください。'
                    : '② のAI候補を確認して ✅ 正しい または ❌ 違う を押してください。\nAIが正しければここは空白のままで学習記録されます。'}
                </div>
              )}

              {aiVerdict==='wrong' && (
                <div>
                  <div style={{fontSize:12,color:'#92400e',marginBottom:8,fontWeight:600}}>
                    ❌ AIが間違っていました。正しい回答をここに入力してください。
                    <span style={{fontWeight:400,marginLeft:6,color:'#b45309'}}>(この内容が学習データになります)</span>
                  </div>
                  <textarea
                    className="correct-ta"
                    value={correctAnswer}
                    onChange={e=>handleCorrectChange(e.target.value)}
                    rows={5}
                    placeholder={'正しい回答本文を入力してください。\n挨拶・署名は不要です（本文のみ）。'}
                    autoFocus
                  />

                  <div style={{marginTop:12,padding:'12px 14px',background:'#f8fafc',borderRadius:10,border:'1px solid #e2e8f0'}}>
                    <div style={{fontSize:12,fontWeight:700,color:'#374151',marginBottom:8}}>
                      なぜ違いましたか？ <span style={{fontWeight:400,color:'#94a3b8'}}>(学習精度が上がります)</span>
                    </div>
                    <div className="reason-sel">
                      {[
                        {k:'wrong_info',   l:'❌ 情報が間違い',        hint:'内容に誤りがあった'},
                        {k:'missing_info', l:'➕ 情報が不足',          hint:'追加すべき情報があった'},
                        {k:'wrong_tone',   l:'🎭 文体・トーンが不適切', hint:'表現や言い回しが合わなかった'},
                        {k:'too_long',     l:'✂️ 長すぎた',            hint:'回答が冗長だった'},
                        {k:'no_candidate', l:'🔍 候補がなかった',       hint:'知識ベースに該当なし'},
                        {k:'other',        l:'🔧 その他',              hint:''},
                      ].map(r=>(
                        <button key={r.k} className={`reason-btn ${editReason===r.k?'on':''}`}
                          onClick={()=>setEditReason(r.k)} title={r.hint}>
                          {r.l}
                        </button>
                      ))}
                    </div>
                    {editReason && (
                      <div style={{fontSize:11,color:'#16a34a',marginTop:8,fontWeight:600}}>
                        ✅ 「{[{k:'wrong_info',l:'情報が間違い'},{k:'missing_info',l:'情報が不足'},{k:'wrong_tone',l:'文体・トーンが不適切'},{k:'too_long',l:'長すぎた'},{k:'no_candidate',l:'候補がなかった'},{k:'other',l:'その他'}].find(r=>r.k===editReason)?.l}」として記録されます
                      </div>
                    )}
                  </div>

                  {canRegister && (
                    <div style={{marginTop:10,padding:'10px 14px',background:'#f0fdf4',border:'1px solid #86efac',borderRadius:8,fontSize:12,color:'#15803d',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                      <span style={{fontWeight:700}}>🧠 送信時に自動でナレッジ登録されます</span>
                      <span style={{color:'#64748b',fontWeight:400}}>次回から同じ質問に候補として表示されます</span>
                      <button onClick={()=>setShowRegister(true)}
                        style={{marginLeft:'auto',fontSize:11,color:'#059669',background:'white',border:'1px solid #86efac',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontWeight:600,whiteSpace:'nowrap'}}>
                        今すぐ登録
                      </button>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })()}

        {/* ④ 返信内容 */}
        <div className="sec">
          <div className="sec-title">
            <span className="sec-num">4</span> 返信内容（送信テキスト）
            {replyManual && <span className="tbadge tbadge-edit">✏️ 直接編集中</span>}
          </div>
          <textarea
            className="reply-ta"
            value={replyTxt}
            onChange={e=>{setReplyTxt(e.target.value);setReplyManual(true);}}
            disabled={isReplied}
            placeholder="② ✅ 正しい を押すとAI回答が自動セットされます。❌ 違う → ③入力後に自動生成されます。"
          />
          <div className="reply-btns">
            <button className="send-btn" onClick={handleSend} disabled={sending||isReplied}>
              {sending?<><span className="spin">⟳</span> 送信中...</>
                :isReplied?'✅ 送信済み':<>📤 送信</>}
            </button>
            <div className="send-info">
              送信元: <span className="send-from">{SEND_FROM_EMAIL}</span>
              {inq.email && !isMobile && <> → <strong>{inq.email}</strong></>}
            </div>
            {!isReplied && replyManual && (
              <button onClick={()=>{setReplyTxt(buildReply(inq,correctAnswer));setReplyManual(false);}}
                style={{padding:'8px 12px',border:'1px solid #e2e8f0',borderRadius:6,cursor:'pointer',fontSize:13,color:'#64748b',minHeight:36}}>
                ↩ 正解から再生成
              </button>
            )}
          </div>
          {msgState && <div className={msgState.type==='ok'?'msg-ok':'msg-err'}>{msgState.txt}</div>}
        </div>

        {inq.reply_content && (
          <div className="sec">
            <div className="sec-title"><span>📤</span> 送信済み内容</div>
            <div className="hist-box">{inq.reply_content}</div>
            {inq.replied_at && <div style={{fontSize:11,color:'#86efac',marginTop:8}}>送信日時: {fmtFull(inq.replied_at)}</div>}
          </div>
        )}
      </div>

      {showRegister && (
        <RegisterKnowledgeModal inq={inq} correctAnswer={correctAnswer}
          onClose={()=>setShowRegister(false)}
          onSaved={()=>setToast('🧠 ナレッジに登録しました！')}/>
      )}
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </>
  );
}

// ===== INBOX VIEW =====
function InboxView({staff}) {
  const isMobile = useIsMobile();
  const [inqs, setInqs]         = useState([]);
  const [sel, setSel]           = useState(null);
  const [mobilePane, setMobilePane] = useState('list');
  const [filter, setFilter]     = useState('all');
  const [search, setSearch]     = useState('');
  const [loading, setLoading]   = useState(true);
  const [syncing, setSyncing]   = useState(false);
  const [showAdd, setShowAdd]   = useState(false);
  const [toast, setToast]       = useState(null);
  const [selectMode, setSelectMode] = useState(false);
  const [selected, setSelected]     = useState(new Set());

  const fetchInqs = useCallback(async () => {
    const {data} = await sb.from('inquiries').select('*')
      .or('source.eq.manual,source.eq.demo,source.eq.gmail_live,source.is.null')
      .order('received_at',{ascending:false});
    setInqs(data||[]); setLoading(false);
  }, []);
  useEffect(()=>{
    fetchInqs();

    const channel = sb.channel('inq_realtime_v2')
      .on('postgres_changes', {event:'*', schema:'public', table:'inquiries'}, payload => {
        if (payload.eventType === 'DELETE') {
          setInqs(p => p.filter(i => i.id !== payload.old.id));
          setSel(prev => prev?.id === payload.old.id ? null : prev);
        } else {
          fetchInqs();
        }
      })
      .subscribe((status) => {
        console.log('[Realtime]', status);
      });

    const poll = setInterval(() => { fetchInqs(); }, 5000);

    return () => {
      sb.removeChannel(channel);
      clearInterval(poll);
    };
  },[fetchInqs]);

  const selectItem = item => {
    if (selectMode) { toggleInboxSelect(item.id); return; }
    setSel(item);
    if (isMobile) setMobilePane('detail');
  };
  const goBack = () => { setMobilePane('list'); };

  const toggleInboxSelect = (id) => {
    setSelected(prev => { const n=new Set(prev); n.has(id)?n.delete(id):n.add(id); return n; });
  };
  const toggleInboxSelectAll = (e) => {
    e.stopPropagation();
    if (selected.size===filtered.length && filtered.length>0) setSelected(new Set());
    else setSelected(new Set(filtered.map(i=>i.id)));
  };
  const handleInboxBulkDelete = async (e) => {
    e.stopPropagation();
    if (selected.size===0) return;
    if (!confirm(`選択した ${selected.size} 件を削除しますか？`)) return;
    const ids=[...selected];
    await sb.from('inquiries').delete().in('id',ids);
    setInqs(p=>p.filter(i=>!ids.includes(i.id)));
    if (ids.includes(sel?.id)) setSel(null);
    setSelected(new Set());
    setSelectMode(false);
    setToast(`🗑 ${ids.length}件削除しました`);
  };

  const filtered = inqs.filter(i=>{
    if (filter==='new')     return i.status==='new' || !i.status;
    if (filter==='prog')    return i.status==='in_progress';
    if (filter==='pending') return i.status==='pending';
    if (filter==='done')    return i.status==='replied';
    return true;
  }).filter(i=>{
    if (!search) return true;
    const q=search.toLowerCase();
    return (i.name||'').toLowerCase().includes(q)||(i.inquiry_content||'').toLowerCase().includes(q)||(i.assigned_to||'').toLowerCase().includes(q);
  });

  const newCount     = inqs.filter(i=>i.status==='new'||!i.status).length;
  const progCount    = inqs.filter(i=>i.status==='in_progress').length;
  const pendingCount = inqs.filter(i=>i.status==='pending').length;

  const handleAdd = async form => {
    const {data} = await sb.from('inquiries').insert([{...form,status:'new',received_at:new Date().toISOString()}]).select().single();
    if (data) { setInqs(p=>[data,...p]); selectItem(data); setToast('✅ 追加しました'); }
  };
  const handleReplyOk = (id, txt) => {
    setInqs(p=>p.map(i=>i.id===id?{...i,status:'replied',reply_content:txt}:i));
    setSel(p=>p?.id===id?{...p,status:'replied',reply_content:txt}:p);
    setToast('✅ 送信・保存完了！');
    setTimeout(fetchInqs, 1000);
  };
  const syncEmails = async () => {
    if (GAS_URL==='YOUR_GAS_WEBAPP_URL_HERE') { alert('GAS URLが未設定のため同期できません'); return; }
    setSyncing(true);
    try {
      await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'sync_emails'})});
      setTimeout(()=>{fetchInqs();setSyncing(false);setToast('📬 メールを同期しました');},3000);
    } catch(e){setSyncing(false);}
  };

  const showSidebar = !isMobile || mobilePane==='list';
  const showDetail  = !isMobile || mobilePane==='detail';

  const storeLabel = (s) => {
    if (s === 'takamatsu') return '🏯';
    return s || '';
  };

  return (
    <div className="wrap">
      {showSidebar && (
        <div className="sidebar">
          <div className="sb-head">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
              <div className="sb-filters" style={{flex:1,flexWrap:'wrap'}}>
                {[
                  {k:'all',    l:'すべて'},
                  {k:'new',    l:`🔴 未対応${newCount>0?`(${newCount})`:''}`,     urgent:newCount>0},
                  {k:'prog',   l:`🟡 対応中${progCount>0?`(${progCount})`:''}`,   urgent:progCount>0},
                  {k:'pending',l:`⏸ 保留中${pendingCount>0?`(${pendingCount})`:''}`, urgent:false},
                  {k:'done',   l:'✅ 完了'},
                ].map(f=>(
                  <button key={f.k} className={`f-btn ${filter===f.k?'on':''}`} onClick={()=>setFilter(f.k)}
                    style={f.urgent&&filter!==f.k?{borderColor:'#ef4444',color:'#ef4444'}:{}}>
                    {f.l}
                  </button>
                ))}
              </div>
              <button onClick={()=>{setSelectMode(v=>!v);setSelected(new Set());}}
                style={{flexShrink:0,marginLeft:6,fontSize:11,fontWeight:700,padding:'4px 9px',borderRadius:6,border:'1px solid',cursor:'pointer',
                  borderColor:selectMode?'#ef4444':'#94a3b8',
                  background:selectMode?'#fef2f2':'#f8fafc',
                  color:selectMode?'#ef4444':'#64748b'}}>
                {selectMode?'✕ 解除':'☑ 選択'}
              </button>
            </div>
            {selectMode && (
              <div style={{display:'flex',gap:6,marginBottom:6,padding:'7px 10px',background:'#fef2f2',borderRadius:8,alignItems:'center'}}>
                <button onClick={toggleInboxSelectAll}
                  style={{fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:6,border:'1px solid #fca5a5',background:'white',color:'#ef4444',cursor:'pointer',whiteSpace:'nowrap'}}>
                  {selected.size===filtered.length&&filtered.length>0?'✕ 全解除':'✓ 全選択'}
                </button>
                <span style={{fontSize:11,color:'#ef4444',fontWeight:600}}>{selected.size}件選択中</span>
                <button onClick={handleInboxBulkDelete} disabled={selected.size===0}
                  style={{marginLeft:'auto',fontSize:11,fontWeight:800,padding:'5px 13px',borderRadius:6,border:'none',
                    background:selected.size>0?'#ef4444':'#fca5a5',color:'white',
                    cursor:selected.size>0?'pointer':'not-allowed',whiteSpace:'nowrap'}}>
                  🗑 {selected.size}件削除
                </button>
              </div>
            )}
            <input className="sb-search" value={search} onChange={e=>setSearch(e.target.value)} placeholder="名前・内容で検索..." type="search"/>
          </div>
          <div className="inq-list">
            {loading ? <div style={{padding:30,textAlign:'center',color:'#94a3b8'}}>読み込み中...</div>
             : filtered.length===0 ? <div style={{padding:30,textAlign:'center',color:'#94a3b8'}}>該当なし</div>
             : filtered.map(i=>{
              const sl=stCfg(i.status);
              return (
                <div key={i.id} className={`inq-card ${sel?.id===i.id&&!isMobile&&!selectMode?'sel':''} ${selectMode&&selected.has(i.id)?'sel':''}`}
                  onClick={()=>selectItem(i)}
                  style={selectMode&&selected.has(i.id)?{background:'#fef2f2',borderColor:'#fca5a5'}:{}}>
                  <div className="ic-top">
                    {selectMode && (
                      <span style={{marginRight:8,fontSize:16,color:selected.has(i.id)?'#ef4444':'#cbd5e1',flexShrink:0}}>
                        {selected.has(i.id)?'☑':'☐'}
                      </span>
                    )}
                    <span className="ic-name">{i.name}</span>
                    <span className="ic-date">{fmt(i.received_at)}</span>
                  </div>
                  <div className="ic-row2">
                    <span className={`st ${sl.c}`}>{sl.icon} {sl.t}</span>
                    {i.assigned_to&&i.status!=='replied'&&<span className="st st-assignee">👤{i.assigned_to}</span>}
                    <span style={{fontSize:11,color:'#64748b'}}>{i.inquiry_type}</span>
                    {i.store&&<span className="st st-store" style={{fontSize:10}}>{storeLabel(i.store)}</span>}
                    {i.source==='demo'&&<span style={{fontSize:10,background:'#fef9c3',color:'#854d0e',padding:'1px 6px',borderRadius:4,fontWeight:700}}>DEMO</span>}
                    {i.was_edited===false&&i.reply_content&&<span className="tbadge tbadge-ai" style={{fontSize:10}}>🤖</span>}
                    {i.was_edited===true&&<span className="tbadge tbadge-edit" style={{fontSize:10}}>✏️</span>}
                  </div>
                  <div className="ic-preview">{i.inquiry_content}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {showDetail && (
        <div className="detail-wrap">
          {sel ? (
            <InquiryDetail key={sel.id} inq={sel} onReplyOk={handleReplyOk} onRefresh={fetchInqs}
              onBack={isMobile ? goBack : null} isMobile={isMobile} staff={staff}/>
          ) : (
            <div className="detail-empty">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              <span>左のリストから問い合わせを選択してください</span>
            </div>
          )}
        </div>
      )}

      {showSidebar && (
        <div className="float-btns">
          <button className="btn-add-inq" onClick={()=>setShowAdd(true)}>＋ 追加</button>
          <button className="sync-btn" onClick={syncEmails} disabled={syncing}>
            {syncing?<><span className="spin">⟳</span></>:'📬 同期'}
          </button>
        </div>
      )}

      {showAdd && <AddModal onClose={()=>setShowAdd(false)} onSave={handleAdd}/>}
      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}

// ===== 学習一覧 =====
function LearningView() {
  const [replied, setReplied] = useState([]);
  const [loading, setLoading] = useState(true);
  const [kbCount, setKbCount] = useState(0);
  const [viewMode, setViewMode] = useState('category');
  const [expandedDiffs, setExpandedDiffs] = useState({});
  const [showLoop, setShowLoop] = useState(true);

  useEffect(()=>{
    Promise.all([
      sb.from('inquiries').select('*').eq('status','replied').neq('source','training').order('replied_at',{ascending:false}),
      sb.from('buddica_knowledge').select('*',{count:'exact',head:true})
    ]).then(([{data},{count}])=>{ setReplied(data||[]); setKbCount(count||0); setLoading(false); });
  },[]);

  const extractBody = (draft) => {
    if (!draft) return null;
    const m = draft.match(/BUDDICA 高松店でございます。\n\n([\s\S]+?)\n\nご不明な点/);
    return m ? m[1] : null;
  };

  const grouped = {};
  replied.forEach(inq=>{ const k=inq.intent_label||'（未分類）'; if(!grouped[k])grouped[k]=[]; grouped[k].push(inq); });
  const catStats = Object.entries(grouped).map(([cat,items])=>{
    const aiCorrect=items.filter(i=>i.was_edited===false).length;
    const ws=items.filter(i=>i.match_score!=null);
    const avgScore=ws.length>0?Math.round(ws.reduce((s,i)=>s+(i.match_score||0),0)/ws.length):null;
    return {cat,items,aiCorrect,avgScore,total:items.length};
  }).sort((a,b)=>b.total-a.total);

  const total=replied.length;
  const aiCorrect=replied.filter(i=>i.was_edited===false).length;
  const editedCount=replied.filter(i=>i.was_edited===true).length;
  const ws=replied.filter(i=>i.match_score!=null);
  const avgScore=ws.length>0?Math.round(ws.reduce((s,i)=>s+(i.match_score||0),0)/ws.length):0;

  const phase = kbCount===0 ? 0 : total===0 ? 1 : aiCorrect/Math.max(total,1)>=0.7 ? 3 : 2;

  const storeLabel = (s) => {
    if (s === 'takamatsu') return '🏯 高松';
    return s || '';
  };

  const LvItem = ({inq}) => {
    const aiBody = extractBody(inq.auto_draft);
    const hasDiff = inq.was_edited && aiBody && inq.correct_answer && aiBody !== inq.correct_answer;
    const open = expandedDiffs[inq.id];
    return (
      <div className="lv-item">
        <div className="lv-item-top">
          <div className="lv-item-q">{inq.inquiry_content?.substring(0,70)}...</div>
          <div className="lv-item-meta">
            {inq.store&&<span className="st st-store" style={{fontSize:10}}>{storeLabel(inq.store)}</span>}
            {inq.was_edited===false&&<span className="tbadge tbadge-ai">🤖 AI正解</span>}
            {inq.was_edited===true&&<span className="tbadge tbadge-edit">✏️ 修正</span>}
            {inq.match_score!=null&&<span style={{fontSize:11,color:'#94a3b8'}}>{inq.match_score}%一致</span>}
          </div>
        </div>
        {inq.correct_answer&&<div className="lv-answer">{inq.correct_answer?.substring(0,100)}...</div>}
        {hasDiff && (
          <div style={{marginTop:6}}>
            <button onClick={()=>setExpandedDiffs(p=>({...p,[inq.id]:!p[inq.id]}))}
              style={{fontSize:11,color:'#d97706',background:'none',border:'1px solid #fed7aa',borderRadius:4,padding:'2px 8px',cursor:'pointer',fontWeight:600}}>
              {open?'▲ 差分を閉じる':'▼ ② → ③ 差分を見る'}
            </button>
            {open && (
              <div className="diff-box" style={{marginTop:6}}>
                <div className="diff-cols">
                  <div className="diff-col diff-col-ai">
                    <div className="diff-col-label">🤖 ② AI提案</div>
                    <div className="diff-col-body">{aiBody}</div>
                  </div>
                  <div className="diff-col diff-col-staff">
                    <div className="diff-col-label">✏️ ③ スタッフ修正</div>
                    <div className="diff-col-body">{inq.correct_answer}</div>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    );
  };

  const reasonLabel = {
    wrong_info:'❌ 情報が間違い', missing_info:'➕ 情報が不足',
    wrong_tone:'🎭 文体が不適切', too_long:'✂️ 長すぎた',
    no_candidate:'🔍 候補なし', other:'🔧 その他'
  };
  const reasonCounts = {};
  replied.filter(i=>i.edit_reason).forEach(i=>{ reasonCounts[i.edit_reason]=(reasonCounts[i.edit_reason]||0)+1; });
  const reasonTotal = Object.values(reasonCounts).reduce((s,v)=>s+v,0);

  const fw5 = [
    {icon:'📥',stage:'Stage 1',lbl:'シード',desc:'公式FAQから知識ベースを構築',kpi:`${kbCount}件`,ref:'IBM Watson Knowledge Base',ok:kbCount>0},
    {icon:'🎯',stage:'Stage 2',lbl:'キャプチャ',desc:'AI提案→スタッフ確認→差分を記録',kpi:`${total}件・差分${editedCount}件`,ref:'RLHF (OpenAI)',ok:total>0},
    {icon:'🔬',stage:'Stage 3',lbl:'エラー分析',desc:'修正理由を分類して弱点を特定',kpi:reasonTotal>0?`理由付き${reasonTotal}件`:'未収集',ref:'Active Learning (Google)',ok:reasonTotal>=5},
    {icon:'🔁',stage:'Stage 4',lbl:'ナレッジ更新',desc:'失敗パターンから知識ベースを改善',kpi:'週次レビュー',ref:'CBR Retain (IBM)',ok:aiCorrect>0&&aiCorrect/Math.max(total,1)>=0.5},
    {icon:'🚀',stage:'Stage 5',lbl:'自動化',desc:'高信頼度案件は自動返信',kpi:'正解率70%以上',ref:'Intercom Resolution Bot',ok:total>0&&aiCorrect/Math.max(total,1)>=0.7},
  ];
  const currentStage = fw5.findIndex(s=>!s.ok);
  const stageIdx = currentStage===-1?5:currentStage;

  return (
    <div className="full-area">
      <div className="lv-wrap">
        <div className="lv-title">📚 学習フライホイール</div>
        <div className="lv-sub">世界的な事例（RLHF・CBR・Active Learning）に基づく永続的な自己改善ループ</div>

        {kbCount===0 && !loading && (
          <div className="kb-warn">
            <div className="kb-warn-icon">⚠️</div>
            <div className="kb-warn-body">
              <strong>知識ベースが空です — Stage 1 が未完了です</strong><br/>
              Supabase の SQL Editor で buddica_knowledge テーブルにナレッジデータを登録してください。
            </div>
          </div>
        )}

        <div className="fw-wrap">
          <div className="fw-title">🔄 フライホイール — 回り続けるほど精度が上がる
            <button onClick={()=>setShowLoop(v=>!v)}
              style={{marginLeft:'auto',fontSize:11,color:'#94a3b8',background:'none',border:'1px solid #e2e8f0',borderRadius:4,padding:'2px 8px',cursor:'pointer'}}>
              {showLoop?'閉じる':'開く'}
            </button>
          </div>
          <div className="fw-sub">終点のない改善サイクル — 問い合わせが増えるほど自動的に精度が向上する</div>
          {showLoop && (
            <div className="fw-cycle">
              {fw5.map((s,i)=>(
                <React.Fragment key={i}>
                  <div className={`fw-step ${s.ok?'active-step':i===stageIdx?'current-step':''}`}>
                    <div className="fw-icon">{s.icon}</div>
                    <div className="fw-stage">{s.stage}</div>
                    <div className="fw-lbl">{s.lbl}</div>
                    <div className="fw-desc">{s.desc}</div>
                    <div className="fw-ref">{s.ref}</div>
                    <div style={{marginTop:4,fontSize:10,fontWeight:700,color:s.ok?'#16a34a':i===stageIdx?'#d97706':'#94a3b8'}}>
                      {s.ok?'✅ 完了':i===stageIdx?'▶ 実施中':'待機'}
                    </div>
                  </div>
                  {i<fw5.length-1 && (
                    <div className="fw-arrow">→</div>
                  )}
                </React.Fragment>
              ))}
              <div className="fw-arrow" style={{color:'#f59e0b'}}>↩</div>
            </div>
          )}
          <div style={{marginTop:12,padding:'10px 14px',background:'#f8fafc',borderRadius:8,fontSize:12,color:'#374151',lineHeight:1.9}}>
            <strong>なぜフライホイールか：</strong>
            線形計画（Phase 1→2→3→終了）は「終わったら止まる」。フライホイールは「問い合わせが来るたびに自動で学習が深まる」自己強化ループ。
            Amazon・OpenAI・Intercomが採用する設計原則で、<span style={{fontWeight:700,color:'#1d4ed8'}}>使えば使うほど賢くなる</span>。<br/>
            <strong>最重要指標:</strong> AI正解率ではなく<span style={{fontWeight:700,color:'#d97706'}}>「修正理由の分布」</span>—これがどこを直せばいいかを教えてくれる。
          </div>
        </div>

        <div className="stage-bar">
          {fw5.map((s,i)=>(
            <div key={i} className={`stage-card ${s.ok?'done':i===stageIdx?'now':'todo'}`}>
              <div className="stage-num" style={{color:s.ok?'#16a34a':i===stageIdx?'#d97706':'#94a3b8'}}>{s.icon}</div>
              <div className="stage-name">{s.stage}: {s.lbl}</div>
              <div className="stage-kpi">{s.kpi}</div>
              <span className={`stage-status ${s.ok?'ok':i===stageIdx?'go':'wait'}`}>
                {s.ok?'✅ 完了':i===stageIdx?'▶ 現在地':'待機'}
              </span>
            </div>
          ))}
        </div>

        <div className="lv-stats">
          <div className="lv-stat">
            <div className="lv-stat-num" style={{color:kbCount>0?'#16a34a':'#ef4444'}}>{kbCount}</div>
            <div className="lv-stat-label">知識ベース<br/><span style={{fontSize:10,color:kbCount===0?'#ef4444':'#64748b'}}>{kbCount===0?'⚠️ 未登録':'Stage 1 完了'}</span></div>
          </div>
          <div className="lv-stat">
            <div className="lv-stat-num">{total}</div>
            <div className="lv-stat-label">返信件数<br/><span style={{fontSize:10,color:'#64748b'}}>学習データ数</span></div>
          </div>
          <div className="lv-stat">
            <div className="lv-stat-num" style={{color:total>0&&aiCorrect/total>=0.7?'#16a34a':'#d97706'}}>{total>0?Math.round(aiCorrect/total*100):0}%</div>
            <div className="lv-stat-label">AI正解率<br/><span style={{fontSize:10,color:'#64748b'}}>目標: 70%</span></div>
          </div>
          <div className="lv-stat">
            <div className="lv-stat-num" style={{color:editedCount>0?'#d97706':'#94a3b8'}}>{editedCount}</div>
            <div className="lv-stat-label">スタッフ修正<br/><span style={{fontSize:10,color:'#64748b'}}>学習信号数</span></div>
          </div>
          <div className="lv-stat">
            <div className="lv-stat-num" style={{color:reasonTotal>0?'#8b5cf6':'#94a3b8'}}>{reasonTotal}</div>
            <div className="lv-stat-label">理由付き修正<br/><span style={{fontSize:10,color:'#64748b'}}>Stage 3 データ</span></div>
          </div>
        </div>

        {reasonTotal > 0 && (
          <div style={{marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:800,color:'#374151',marginBottom:8}}>🔬 Stage 3: 修正理由分析（エラーパターン）</div>
            <div style={{fontSize:12,color:'#64748b',marginBottom:10}}>
              どのカテゴリの失敗が多いかを把握することで、次に強化すべき知識ベースのポイントが分かる（Active Learning の原則）
            </div>
            <div className="reason-bar">
              {Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
                <div key={k} className="reason-card">
                  <div className="reason-icon">{reasonLabel[k]?.split(' ')[0]||'🔧'}</div>
                  <div>
                    <div className="reason-label">{reasonLabel[k]?.split(' ').slice(1).join(' ')||k}</div>
                    <div className="reason-pct">{Math.round(v/reasonTotal*100)}%</div>
                  </div>
                  <div className="reason-count">{v}</div>
                </div>
              ))}
            </div>
            <div style={{padding:'10px 12px',background:'#ede9fe',borderRadius:8,fontSize:12,color:'#374151',lineHeight:1.8}}>
              <strong>次のアクション：</strong>{' '}
              {Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]==='wrong_info'&&'知識ベースの情報に誤りがあります。該当カテゴリのanswerを修正してください。'}
              {Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]==='missing_info'&&'知識ベースの回答に不足情報があります。answerに追記するか、新しいエントリを追加してください。'}
              {Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]==='no_candidate'&&'ナレッジに登録されていない新しい問い合わせパターンがあります。「ナレッジ登録」で追加してください。'}
              {Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]==='wrong_tone'&&'回答の文体がBUDDICAのスタイルと合っていません。buddica_knowledgeのanswerを見直してください。'}
              {Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]==='too_long'&&'回答が長すぎます。知識ベースの該当answerを簡潔にまとめてください。'}
              {Object.entries(reasonCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]==='other'&&'理由を「その他」以外で記録するとより詳細な分析が可能です。'}
            </div>
          </div>
        )}

        <div className="lv-view-switch">
          <button className={`kb-f ${viewMode==='category'?'on':''}`} onClick={()=>setViewMode('category')}>📂 カテゴリ別</button>
          <button className={`kb-f ${viewMode==='list'?'on':''}`} onClick={()=>setViewMode('list')}>📋 一覧</button>
          <button className={`kb-f ${viewMode==='diff'?'on':''}`} onClick={()=>setViewMode('diff')} style={editedCount>0?{borderColor:'#d97706',color:'#d97706'}:{}}>✏️ 差分{editedCount>0?`(${editedCount})`:''}</button>
        </div>

        {loading ? <div className="lv-empty">読み込み中...</div>
        : total===0 ? (
          <div className="lv-empty">
            <div style={{fontSize:40,marginBottom:12}}>📭</div>
            <strong>まだ学習データがありません</strong><br/>
            <span style={{fontSize:13,color:'#94a3b8',marginTop:6,display:'block'}}>Stage 1（知識ベース登録）完了後、問い合わせに返信すると自動で蓄積されます</span>
          </div>
        ) : viewMode==='category' ? (
          catStats.map(({cat,items,aiCorrect,avgScore,total})=>(
            <div key={cat} className="lv-cat-group">
              <div className="lv-cat-hd">
                {cat}
                <span className="lv-cat-cnt">{total}件</span>
                <span className="lv-cat-stats">AI正解: {Math.round(aiCorrect/total*100)}%{avgScore!=null&&` / 一致率: ${avgScore}%`}</span>
              </div>
              {items.map(inq=><LvItem key={inq.id} inq={inq}/>)}
            </div>
          ))
        ) : viewMode==='diff' ? (
          replied.filter(i=>i.was_edited===true).length===0 ? (
            <div className="lv-empty">差分あり（スタッフ修正）の件数はまだありません</div>
          ) : (
            <>
              <div style={{fontSize:12,color:'#64748b',marginBottom:10}}>
                スタッフが修正した件（RLHF の学習信号） — 最も価値ある学習データ。理由付きは特に高品質。
              </div>
              {replied.filter(i=>i.was_edited===true).map(inq=>(
                <div key={inq.id} style={{marginBottom:8}}>
                  {inq.edit_reason && (
                    <div style={{fontSize:11,fontWeight:700,color:'#8b5cf6',marginBottom:2}}>
                      修正理由: {reasonLabel[inq.edit_reason]||inq.edit_reason}
                    </div>
                  )}
                  <LvItem inq={inq}/>
                </div>
              ))}
            </>
          )
        ) : (
          <div className="lv-list-table">
            {replied.map(inq=>{
              const aiBody = extractBody(inq.auto_draft);
              const hasDiff = inq.was_edited && aiBody && inq.correct_answer && aiBody !== inq.correct_answer;
              return (
                <div key={inq.id} className="lv-list-row">
                  <div className="lv-list-q">{inq.inquiry_content?.substring(0,60)}...</div>
                  <div className="lv-list-meta">
                    <span style={{fontSize:12,color:'#64748b'}}>{inq.intent_label||'-'}</span>
                    {inq.store&&<span className="st st-store" style={{fontSize:10}}>{storeLabel(inq.store)}</span>}
                    {inq.was_edited===false&&<span className="tbadge tbadge-ai">🤖</span>}
                    {inq.was_edited===true&&<span className="tbadge tbadge-edit">✏️</span>}
                    {inq.edit_reason&&<span style={{fontSize:10,color:'#8b5cf6',fontWeight:600}}>{reasonLabel[inq.edit_reason]?.split(' ')[0]}</span>}
                    {hasDiff&&<span style={{fontSize:11,color:'#d97706',fontWeight:600}}>差分あり</span>}
                    {inq.match_score!=null&&<span style={{fontSize:11,color:'#94a3b8'}}>{inq.match_score}%</span>}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ===== 知識ベース =====
function KnowledgeView() {
  const [items, setItems]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [storeF, setStoreF] = useState('all');
  const [catF, setCatF]     = useState('all');
  const [search, setSearch] = useState('');

  useEffect(()=>{
    sb.from('buddica_knowledge').select('*').order('priority').order('store').order('category')
      .then(({data})=>{setItems(data||[]);setLoading(false);});
  },[]);

  const cats=['all',...new Set(items.map(i=>i.category))];
  const filtered=items.filter(i=>{
    if(storeF!=='all'&&i.store!==storeF)return false;
    if(catF!=='all'&&i.category!==catF)return false;
    if(search){const q=search.toLowerCase();return(i.question||'').toLowerCase().includes(q)||(i.answer||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q);}
    return true;
  });
  const storeLabel=s=>({takamatsu:'🏯 高松',both:'🌐 共通'}[s]||s);
  const storeClass=s=>({takamatsu:'kb-s-takamatsu',both:'kb-s-both'}[s]||'');

  return (
    <div className="full-area">
      <div className="kb-wrap">
        <div className="kb-hd">
          <div>
            <div className="kb-title">🧠 知識ベース</div>
            <div className="kb-sub">{items.length}件のナレッジ登録済み</div>
          </div>
          <input className="kb-search" value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 キーワード検索..." type="search"/>
        </div>
        <div className="kb-filters">
          {['all','takamatsu','both'].map(s=>(
            <button key={s} className={`kb-f ${storeF===s?'on':''}`} onClick={()=>setStoreF(s)}>
              {s==='all'?'すべての店舗':storeLabel(s)}
            </button>
          ))}
          <span style={{color:'#cbd5e1',marginLeft:4}}>|</span>
          {cats.map(c=>(
            <button key={c} className={`kb-f ${catF===c?'on':''}`} onClick={()=>setCatF(c)}>
              {c==='all'?'全カテゴリ':c}
            </button>
          ))}
        </div>
        {loading ? <div className="kb-empty">読み込み中...</div>
        : filtered.length===0 ? (
          <div className="kb-empty">
            {items.length===0
              ? <>ナレッジがまだ登録されていません<br/><br/>
                 <span style={{fontSize:13,lineHeight:2}}>Supabase SQL Editorでbuddica_knowledgeテーブルにデータを登録してください</span></>
              : '該当するナレッジがありません'}
          </div>
        ) : (
          <div className="kb-grid">
            {filtered.map(item=>(
              <div key={item.id} className="kb-row">
                <div className="kb-top">
                  <span className="kb-cat">{item.category}</span>
                  <div className="kb-tags">
                    <span className={`kb-store ${storeClass(item.store)}`}>{storeLabel(item.store)}</span>
                  </div>
                </div>
                <div className="kb-q">{item.question}</div>
                <div className="kb-a">{item.answer}</div>
                {item.rule_basis&&<div className="kb-basis">📌 {item.rule_basis}</div>}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ===== テンプレート =====
function TemplatesView() {
  const [tmpls, setTmpls] = useState([]);
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [toast, setToast] = useState(null);

  useEffect(()=>{
    sb.from('reply_templates').select('*').order('usage_count',{ascending:false})
      .then(({data})=>setTmpls(data||[]));
  },[]);

  const handleSave=async t=>{
    if(t.id){const{data}=await sb.from('reply_templates').update({category:t.category,keywords:t.keywords,template_text:t.template_text,updated_at:new Date().toISOString()}).eq('id',t.id).select().single();if(data){setTmpls(p=>p.map(x=>x.id===data.id?data:x));setToast('✅ 更新しました');}}
    else{const{data}=await sb.from('reply_templates').insert([{category:t.category,keywords:t.keywords,template_text:t.template_text,usage_count:0}]).select().single();if(data){setTmpls(p=>[...p,data]);setToast('✅ 追加しました');}}
  };
  const handleDel=async id=>{if(!confirm('削除しますか？'))return;await sb.from('reply_templates').delete().eq('id',id);setTmpls(p=>p.filter(t=>t.id!==id));setToast('🗑️ 削除しました');};

  function TmplModal({tmpl,onClose}){
    const[f,setF]=useState({category:tmpl?.category||'',kws_str:(tmpl?.keywords||[]).join(', '),template_text:tmpl?.template_text||''});
    const upd=(k,v)=>setF(p=>({...p,[k]:v}));
    const save=async()=>{if(!f.category.trim()||!f.template_text.trim()){alert('カテゴリと本文は必須です');return;}const kws=f.kws_str.split(',').map(k=>k.trim()).filter(Boolean);await handleSave({...tmpl,category:f.category,keywords:kws,template_text:f.template_text});onClose();};
    return(<div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal"><div className="modal-handle"/><div className="m-title">{tmpl?.id?'✏️ 編集':'➕ 新規作成'}</div><div className="fg"><label className="fl">カテゴリ *</label><input className="fi" value={f.category} onChange={e=>upd('category',e.target.value)}/></div><div className="fg"><label className="fl">キーワード（カンマ区切り）</label><input className="fi" value={f.kws_str} onChange={e=>upd('kws_str',e.target.value)}/></div><div className="fg"><label className="fl">本文 *</label><textarea className="ft" value={f.template_text} onChange={e=>upd('template_text',e.target.value)} style={{minHeight:140}}/></div><div className="m-actions"><button className="btn-cancel" onClick={onClose}>キャンセル</button><button className="btn-save" onClick={save}>保存する</button></div></div></div>);
  }

  return(
    <div className="full-area">
      <div className="tmpl-wrap">
        <div className="tmpl-hd">
          <div><div className="tmpl-title">📋 テンプレート</div><div style={{fontSize:13,color:'#64748b',marginTop:4}}>補助テンプレート管理</div></div>
          <button className="btn-new" onClick={()=>{setEditing(null);setShowModal(true);}}>＋ 新規作成</button>
        </div>
        {tmpls.length===0?<div className="tmpl-empty">テンプレートがありません</div>:(
          <div className="tmpl-grid">
            {tmpls.sort((a,b)=>(b.usage_count||0)-(a.usage_count||0)).map(t=>(
              <div className="tmpl-row" key={t.id}>
                <div className="tmpl-rt">
                  <span className="tmpl-cat">{t.category}</span>
                  <div className="tmpl-btn-grp">
                    <span className="tmpl-usage">{t.usage_count||0}回</span>
                    <button className="btn-edit" onClick={()=>{setEditing(t);setShowModal(true);}}>編集</button>
                    <button className="btn-del" onClick={()=>handleDel(t.id)}>削除</button>
                  </div>
                </div>
                <div className="tmpl-kws">{(t.keywords||[]).map(k=><span key={k} className="tmpl-kw">🔑 {k}</span>)}</div>
                <div className="tmpl-txt">{t.template_text}</div>
              </div>
            ))}
          </div>
        )}
      </div>
      {showModal&&<TmplModal tmpl={editing} onClose={()=>setShowModal(false)}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
}
