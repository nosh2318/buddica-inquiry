<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BUDDICA お問い合わせ管理</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f0f2f5;color:#1a202c;}

/* ====== HEADER ====== */
.hd{background:#0f172a;color:white;height:54px;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:200;}
.hd-logo{font-size:15px;font-weight:800;letter-spacing:2px;color:#60a5fa;white-space:nowrap;}
.hd-title{font-size:11px;color:#64748b;border-left:1px solid #334155;padding-left:12px;white-space:nowrap;}
.hd-tabs{display:flex;gap:2px;margin-left:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1;}
.hd-tabs::-webkit-scrollbar{display:none;}
.tab-btn{padding:6px 12px;border:none;background:transparent;color:#94a3b8;cursor:pointer;border-radius:6px;font-size:13px;transition:all .2s;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.tab-btn.on{background:#1e3a5f;color:#60a5fa;font-weight:600;}
.tab-btn:hover:not(.on){background:#1e293b;color:#e2e8f0;}
.hd-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.badge-new{background:#ef4444;color:white;border-radius:10px;padding:2px 7px;font-size:11px;font-weight:700;}

/* ====== LAYOUT ====== */
.page-root{display:flex;flex-direction:column;height:100vh;}
.wrap{display:flex;flex:1;overflow:hidden;max-width:100vw;}

/* ====== SIDEBAR ====== */
.sidebar{width:320px;min-width:280px;background:white;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0;}
.sb-head{padding:12px;border-bottom:1px solid #f1f5f9;}
.sb-filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.f-btn{padding:6px 10px;border-radius:16px;border:1px solid #e2e8f0;background:white;cursor:pointer;font-size:12px;color:#64748b;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.f-btn.on{background:#1d4ed8;color:white;border-color:#1d4ed8;}
.sb-search{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:16px;outline:none;-webkit-appearance:none;}
.sb-search:focus{border-color:#3b82f6;}
.inq-list{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
.inq-card{padding:13px 14px;border-bottom:1px solid #f8fafc;cursor:pointer;border-left:3px solid transparent;-webkit-tap-highlight-color:transparent;transition:background .1s;}
.inq-card:active{background:#f0f4ff;}
.inq-card.sel{background:#eff6ff;border-left-color:#3b82f6;}
.ic-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.ic-name{font-weight:700;font-size:14px;}
.ic-date{font-size:11px;color:#94a3b8;}
.ic-row2{display:flex;gap:5px;align-items:center;margin-bottom:3px;flex-wrap:wrap;}
.ic-preview{font-size:12px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ====== STATUS ====== */
.st{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600;}
.st-new{background:#fee2e2;color:#b91c1c;}
.st-prog{background:#fef9c3;color:#854d0e;}
.st-pending{background:#e2e8f0;color:#475569;}
.st-done{background:#dcfce7;color:#15803d;}
.st-store{background:#ede9fe;color:#6d28d9;}
.st-assignee{background:#dbeafe;color:#1e40af;font-size:10px;}
/* ====== STATUS CHANGE BAR ====== */
.status-bar{display:flex;align-items:center;gap:6px;padding:10px 14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:10px;flex-wrap:wrap;}
.status-bar-label{font-size:11px;font-weight:700;color:#64748b;white-space:nowrap;}
.status-btn{padding:5px 10px;border-radius:8px;border:1.5px solid;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;min-height:30px;white-space:nowrap;}
.status-btn-new{border-color:#ef4444;color:#b91c1c;background:white;}
.status-btn-new:hover,.status-btn-new.on{background:#ef4444;color:white;}
.status-btn-prog{border-color:#d97706;color:#d97706;background:white;}
.status-btn-prog:hover,.status-btn-prog.on{background:#d97706;color:white;}
.status-btn-pending{border-color:#94a3b8;color:#475569;background:white;}
.status-btn-pending:hover,.status-btn-pending.on{background:#64748b;color:white;}
.status-btn-done{border-color:#16a34a;color:#16a34a;background:white;}
.status-btn-done:hover,.status-btn-done.on{background:#16a34a;color:white;}
.assignee-tag{display:flex;align-items:center;gap:4px;font-size:11px;color:#1e40af;background:#dbeafe;padding:3px 8px;border-radius:8px;font-weight:700;}
.lock-banner{padding:10px 14px;background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;font-size:13px;font-weight:600;color:#b91c1c;margin-bottom:10px;display:flex;align-items:center;gap:8px;}

/* ====== DETAIL WRAP ====== */
.detail-wrap{flex:1;min-width:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:#f8fafc;}
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#94a3b8;gap:12px;padding:40px;}
.detail-inner{padding:16px;max-width:800px;width:100%;overflow-x:hidden;box-sizing:border-box;}

/* ====== BACK BUTTON (mobile) ====== */
.back-bar{display:none;background:white;border-bottom:1px solid #e2e8f0;padding:10px 16px;}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:#1d4ed8;font-size:14px;font-weight:600;cursor:pointer;padding:4px 0;-webkit-tap-highlight-color:transparent;}

/* ====== SECTIONS ====== */
.sec{background:white;border-radius:12px;border:1px solid #e2e8f0;padding:14px;margin-bottom:10px;overflow:hidden;min-width:0;}
.sec-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sec-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:#1d4ed8;color:white;border-radius:50%;font-size:11px;font-weight:800;flex-shrink:0;}
.dh{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px;}
.dh-name{font-size:18px;font-weight:800;margin-bottom:5px;}
.dh-meta{display:flex;flex-wrap:wrap;gap:8px;}
.meta{font-size:12px;color:#4b5563;}
.meta strong{color:#374151;}
.content-box{background:#f8fafc;border-radius:8px;padding:12px;font-size:14px;line-height:1.8;white-space:pre-wrap;border:1px solid #f1f5f9;word-break:break-all;overflow-wrap:anywhere;overflow:hidden;max-width:100%;min-width:0;}

/* ====== CANDIDATES ====== */
.cand-list{display:flex;flex-direction:column;gap:8px;}
.cand{border:1.5px solid #e2e8f0;border-radius:10px;padding:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;}
.cand:active{background:#eff6ff;border-color:#3b82f6;}
.cand.picked{border-color:#3b82f6;background:#eff6ff;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.cand-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.cand-cat{font-weight:700;font-size:13px;color:#1e293b;}
.cand-score{font-size:11px;font-weight:700;color:white;padding:2px 8px;border-radius:10px;}
.score-hi{background:#16a34a;} .score-mid{background:#d97706;} .score-lo{background:#94a3b8;}
.cand-q{font-size:11px;color:#1d4ed8;font-weight:600;margin-bottom:4px;}
.cand-prev{font-size:12px;color:#64748b;line-height:1.5;}
.no-cand{text-align:center;padding:16px;color:#94a3b8;font-size:13px;border:2px dashed #e2e8f0;border-radius:8px;}

/* ====== 正解セクション ====== */
.sec-correct{border-color:#f59e0b;background:#fffbeb;}
.sec-correct .sec-title{color:#92400e;}
.correct-ta{width:100%;min-height:120px;padding:12px;border:1.5px solid #f59e0b;border-radius:8px;font-size:16px;line-height:1.8;resize:vertical;font-family:inherit;outline:none;background:#fffbeb;-webkit-appearance:none;}
.correct-ta:focus{border-color:#d97706;box-shadow:0 0 0 3px rgba(245,158,11,.15);}
.correct-ta:disabled{background:#f8fafc;color:#94a3b8;border-color:#e2e8f0;}
.register-btn{padding:10px 16px;background:#f59e0b;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;transition:all .2s;-webkit-tap-highlight-color:transparent;min-height:44px;}
.register-hint{font-size:12px;color:#92400e;margin-top:6px;}

/* ====== REPLY EDITOR ====== */
.reply-ta{width:100%;min-height:180px;padding:12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:16px;line-height:1.8;resize:vertical;font-family:inherit;outline:none;-webkit-appearance:none;}
.reply-ta:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1);}
.reply-ta:disabled{background:#f8fafc;color:#94a3b8;}
.reply-btns{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap;}
.send-btn{padding:12px 22px;background:#1d4ed8;color:white;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:700;transition:all .2s;min-height:44px;-webkit-tap-highlight-color:transparent;}
.send-btn:disabled{background:#94a3b8;cursor:not-allowed;}
.send-info{font-size:12px;color:#64748b;}
.send-from{color:#1d4ed8;font-weight:600;}
.msg-ok{color:#15803d;font-size:13px;font-weight:600;padding:10px 12px;background:#dcfce7;border-radius:8px;margin-top:8px;}
.msg-err{color:#b91c1c;font-size:13px;padding:10px 12px;background:#fee2e2;border-radius:8px;margin-top:8px;}
.hist-box{background:#f0fdf4;border-radius:8px;padding:12px;font-size:13px;color:#374151;white-space:pre-wrap;line-height:1.7;border:1px solid #bbf7d0;}

/* ====== BADGES ====== */
.tbadge{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:600;}
.tbadge-ai{background:#dbeafe;color:#1d4ed8;}
.tbadge-edit{background:#fef3c7;color:#92400e;}
.tbadge-training{background:#ede9fe;color:#6d28d9;}

/* ====== STAFF SELECTOR ====== */
.staff-sel{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;}
.staff-sel select{background:#1e3a5f;color:#93c5fd;border:1px solid #334155;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:700;cursor:pointer;outline:none;}
.staff-badge{font-size:12px;color:#60a5fa;font-weight:700;white-space:nowrap;}

/* ====== TRAINING VIEW ====== */
.training-banner{background:linear-gradient(135deg,#6d28d9,#4f46e5);color:white;padding:10px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;border-radius:8px;margin-bottom:12px;}
.training-done-btn{width:100%;padding:14px;background:#6d28d9;color:white;border:none;border-radius:10px;cursor:pointer;font-size:15px;font-weight:800;margin-top:8px;min-height:48px;transition:all .2s;}
.training-done-btn:disabled{background:#a78bfa;cursor:not-allowed;}
.training-done-btn:not(:disabled):active{background:#5b21b6;}

/* ====== INBOX LAYOUT (共通) ====== */
.inbox-layout{display:flex;flex:1;overflow:hidden;height:100%;}
.list-panel{width:340px;min-width:280px;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden;background:white;flex-shrink:0;}
.list-panel > div:last-child{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.detail-panel{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#f8fafc;}
@media(max-width:768px){.list-panel{width:100%;border-right:none;}.inbox-layout{flex-direction:column;}}

/* ====== AI SCANNING ====== */
.ai-scanning{display:flex;align-items:center;gap:10px;padding:14px 16px;background:linear-gradient(90deg,#eff6ff,#dbeafe,#eff6ff);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px;border:1.5px solid #93c5fd;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.ai-scanning-txt{font-size:13px;font-weight:600;color:#1d4ed8;}
.ai-done-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f0fdf4;border-radius:8px;border:1px solid #86efac;margin-bottom:8px;font-size:12px;color:#15803d;font-weight:600;}

/* ====== DIFF VIEWER ====== */
.diff-box{margin-top:10px;border-radius:10px;overflow:hidden;border:1.5px solid #e2e8f0;}
.diff-hd{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#f8fafc;font-size:12px;font-weight:700;color:#374151;border-bottom:1px solid #e2e8f0;flex-wrap:wrap;}
.diff-cols{display:grid;grid-template-columns:1fr 1fr;}
.diff-col{padding:10px 12px;}
.diff-col-ai{background:#eff6ff;border-right:1px solid #e2e8f0;}
.diff-col-staff{background:#fffbeb;}
.diff-col-label{font-size:10px;font-weight:800;letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase;}
.diff-col-ai .diff-col-label{color:#1d4ed8;}
.diff-col-staff .diff-col-label{color:#d97706;}
.diff-col-body{font-size:12px;line-height:1.7;white-space:pre-wrap;color:#374151;max-height:140px;overflow-y:auto;}
.diff-no-change{padding:10px 12px;font-size:12px;color:#64748b;background:#f8fafc;}
@media(max-width:768px){.diff-cols{grid-template-columns:1fr;}.diff-col-ai{border-right:none;border-bottom:1px solid #e2e8f0;}}

/* ====== LEARNING DIFF ====== */
.lv-diff{margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;}
.lv-diff-chip{font-size:11px;padding:2px 8px;border-radius:4px;}
.lv-diff-ai{background:#dbeafe;color:#1d4ed8;}
.lv-diff-staff{background:#fef3c7;color:#92400e;}

/* ====== MODAL ====== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:9999;backdrop-filter:blur(2px);}
.modal{background:white;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:0 -8px 40px rgba(0,0,0,.25);}
.modal-handle{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 20px;}
.m-title{font-size:17px;font-weight:800;margin-bottom:18px;color:#0f172a;}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.fi{width:100%;padding:12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:16px;font-family:inherit;outline:none;-webkit-appearance:none;}
.fi:focus{border-color:#3b82f6;}
.ft{width:100%;padding:12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:16px;min-height:100px;resize:vertical;font-family:inherit;outline:none;-webkit-appearance:none;}
.ft:focus{border-color:#3b82f6;}
.fhint{font-size:11px;color:#94a3b8;margin-top:4px;}
.m-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.btn-cancel{padding:12px 16px;border:1.5px solid #e2e8f0;background:white;border-radius:8px;cursor:pointer;font-size:14px;color:#374151;min-height:44px;}
.btn-save{padding:12px 20px;background:#1d4ed8;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;min-height:44px;}

/* ====== FULL VIEWS ====== */
.full-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ====== KNOWLEDGE VIEW ====== */
.kb-wrap{padding:16px;max-width:1000px;margin:0 auto;}
.kb-hd{margin-bottom:16px;}
.kb-title{font-size:18px;font-weight:800;}
.kb-sub{font-size:13px;color:#64748b;margin-top:4px;}
.kb-search{width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:16px;outline:none;margin-top:10px;-webkit-appearance:none;}
.kb-filters{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none;}
.kb-filters::-webkit-scrollbar{display:none;}
.kb-f{padding:6px 12px;border-radius:16px;border:1px solid #e2e8f0;background:white;cursor:pointer;font-size:12px;color:#64748b;white-space:nowrap;flex-shrink:0;min-height:32px;-webkit-tap-highlight-color:transparent;}
.kb-f.on{background:#1d4ed8;color:white;border-color:#1d4ed8;}
.kb-grid{display:grid;gap:10px;}
.kb-row{background:white;border-radius:12px;border:1px solid #e2e8f0;padding:14px;}
.kb-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;}
.kb-cat{font-weight:800;font-size:14px;}
.kb-tags{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.kb-store{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;}
.kb-s-takamatsu{background:#fef3c7;color:#92400e;}
.kb-s-both{background:#ede9fe;color:#6d28d9;}
.kb-q{font-size:12px;color:#374151;margin-bottom:8px;padding:8px;background:#f8fafc;border-radius:6px;line-height:1.6;}
.kb-a{font-size:13px;color:#1e293b;line-height:1.7;white-space:pre-wrap;border-left:3px solid #3b82f6;padding-left:12px;}
.kb-basis{font-size:11px;color:#94a3b8;margin-top:8px;font-style:italic;}
.kb-empty{text-align:center;padding:60px 20px;color:#94a3b8;}

/* ====== LEARNING VIEW ====== */
.lv-wrap{padding:16px;max-width:1000px;margin:0 auto;}
.lv-title{font-size:18px;font-weight:800;margin-bottom:4px;}
.lv-sub{font-size:13px;color:#64748b;margin-bottom:16px;}
.lv-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.lv-stat{background:white;border-radius:12px;border:1px solid #e2e8f0;padding:14px;text-align:center;}
.lv-stat-num{font-size:28px;font-weight:800;color:#1d4ed8;}
.lv-stat-label{font-size:11px;color:#64748b;margin-top:3px;}
.lv-view-switch{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.lv-cat-group{margin-bottom:18px;}
.lv-cat-hd{font-weight:800;font-size:14px;padding:10px 0 8px;border-bottom:2px solid #1d4ed8;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.lv-cat-cnt{font-size:12px;background:#dbeafe;color:#1d4ed8;padding:2px 8px;border-radius:10px;font-weight:600;}
.lv-cat-stats{font-size:12px;color:#64748b;font-weight:400;}
.lv-item{background:white;border-radius:8px;border:1px solid #f1f5f9;padding:11px;margin-bottom:6px;}
.lv-item-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px;}
.lv-item-q{font-size:13px;color:#374151;flex:1;font-weight:600;}
.lv-item-meta{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.lv-answer{font-size:12px;color:#64748b;white-space:pre-wrap;max-height:56px;overflow:hidden;line-height:1.6;background:#f8fafc;padding:8px;border-radius:6px;border-left:3px solid #e2e8f0;}
.lv-list-table{background:white;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden;}
.lv-list-row{padding:12px 14px;border-bottom:1px solid #f8fafc;display:flex;gap:10px;align-items:flex-start;}
.lv-list-q{flex:1;font-size:13px;color:#374151;}
.lv-list-meta{display:flex;gap:6px;flex-shrink:0;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.lv-empty{text-align:center;padding:60px 20px;color:#94a3b8;}

/* ====== FLYWHEEL ====== */
.fw-wrap{background:white;border-radius:14px;border:1px solid #e2e8f0;padding:18px;margin-bottom:16px;}
.fw-title{font-size:13px;font-weight:800;color:#374151;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.fw-sub{font-size:12px;color:#94a3b8;margin-bottom:14px;}
.fw-cycle{display:flex;align-items:stretch;gap:0;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.fw-step{flex-shrink:0;width:112px;background:#f8fafc;border-radius:10px;border:1.5px solid #e2e8f0;padding:10px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;}
.fw-step.active-step{background:#eff6ff;border-color:#93c5fd;}

const fmt = ts => {
  if (!ts) return '-';
  const d = new Date(ts), now = new Date(), diff = now - d;
  if (diff < 3600000) return `${Math.floor(diff/60000)}分前`;
  if (diff < 86400000) return `${Math.floor(diff/3600000)}時間前`;
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};

// ===== 知識ベース検索 =====
const scoreEntry = (entry, content, inquiryType) => {
  const patterns = entry.question.split('/').map(q => q.trim()).filter(Boolean);
  const cL = content.toLowerCase(), tL = (inquiryType||'').toLowerCase();
  let maxScore = 0, bestPattern = patterns[0];
  patterns.forEach(p => {
    const pL = p.toLowerCase();
    const words = pL.split(/[\s　・、。？?！!\//]+/).filter(w=>w.length>=2);
    if (!words.length) return;
    const matched = words.filter(w=>cL.includes(w));
    let score = matched.length / words.length;
    if (cL.includes(pL.replace(/\s/g,''))) score = Math.max(score, 0.8);
    if (score > maxScore) { maxScore = score; bestPattern = p; }
  });
  const catL = entry.category.toLowerCase();
  const typeClean = tL.replace(/について$/,'').replace(/・.+/,'');
  if (typeClean && catL.includes(typeClean)) maxScore = Math.min(maxScore+0.25, 1);
  if (entry.rule_basis) {
    const bw = entry.rule_basis.toLowerCase().split(/[\s　・、。！?]+/).filter(w=>w.length>=2);
    const bm = bw.filter(w=>cL.includes(w));
    if (bw.length>0) maxScore = Math.min(maxScore+(bm.length/bw.length)*0.15, 1);
  }
  return { score: Math.round(maxScore*100), bestPattern };
};

const searchKnowledge = async (inq) => {
  if (!inq?.inquiry_content) return [];
  const {data, error} = await sb.from('buddica_knowledge')
    .select('*').in('store',['takamatsu','both']).order('priority',{ascending:true});
  if (error||!data||!data.length) return [];
  return data.map(entry => {
    const {score, bestPattern} = scoreEntry(entry, inq.inquiry_content, inq.inquiry_type);
    return {...entry, score, bestPattern};
  }).filter(e=>e.score>=15)
    .sort((a,b)=>b.score-a.score||a.priority-b.priority)
    .slice(0,4);
};
